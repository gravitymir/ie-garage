<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parts - Cleere Auto Services</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;900&display=swap" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "JetBrains Mono", monospace;
      margin: 0; padding: 20px;
      color: #111; background: #f5f5f5;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .topbar h1 { margin: 0; font-size: 1.4rem; }
    a.home { text-decoration: none; color: #3275ac; font-weight: 600; }
    .toolbar {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    input[type="search"] {
      font-family: inherit; padding: 8px 10px; border: 1px solid #bbb;
      border-radius: 4px; font-size: 14px; flex: 1; min-width: 200px;
    }
    /* Main page search — doubled font size */
    #search {
      font-size: 28px;
      padding: 10px 14px;
    }
    button {
      font-family: inherit; padding: 8px 14px;
      border: 1px solid #3275ac; background: #3275ac; color: #fff;
      border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    button:hover { opacity: 0.9; }
    .muted { color: #666; font-size: 13px; margin: 8px 0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .part {
      background: #fff; border: 1px solid #ccc; border-radius: 8px;
      text-decoration: none; color: inherit; overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform 0.1s, border-color 0.1s;
    }
    .part:hover { border-color: #3275ac; transform: translateY(-1px); }
    .thumb {
      width: 100%; aspect-ratio: 4/3;
      background: #eee center/contain no-repeat;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; color: #999;
    }
    .info { padding: 10px 12px; }
    .name { font-weight: 600; font-size: 0.95rem; }
    .num { color: #3275ac; font-weight: 600; font-size: 0.85rem; margin-top: 2px; }
    .desc { color: #555; font-size: 0.78rem; margin-top: 4px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
  <script src="/overlay.js"></script>  <script src="/auth.js"></script>  <script src="/chat.js"></script>
</head>

<body>
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:12px;">
      <a class="home" href="/index.html" style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid #3275ac; border-radius:4px; color:#3275ac; text-decoration:none; font-weight:600;">&larr; Home</a>
      <h1>Parts</h1>
    </div>
  </div>

  <div class="toolbar">
    <input type="search" id="search" placeholder="Search by name, number, description..." />
    <button onclick="window.location.href='/part.html'">+ Add Part</button>
  </div>

  <div class="muted" id="status">Loading...</div>
  <div class="grid" id="grid"></div>

  <script>
    const grid = document.getElementById("grid");
    const statusEl = document.getElementById("status");
    const searchEl = document.getElementById("search");
    let parts = [];

    function render() {
      const q = (searchEl.value || "").toLowerCase().trim();
      const filtered = parts.filter(p => {
        if (!q) return true;
        return [p.name, p.number, p.description, p.notes]
          .some(v => String(v || "").toLowerCase().includes(q));
      });
      grid.innerHTML = "";
      if (!filtered.length) {
        statusEl.textContent = parts.length ? "No matches." : "No parts yet. Click + Add Part.";
        return;
      }
      statusEl.textContent = "";
      filtered.forEach(p => {
        const a = document.createElement("a");
        a.className = "part";
        a.href = `/part.html?id=${encodeURIComponent(p.id)}`;
        const img = (p.images && p.images.length)
          ? `/parts-files/${encodeURIComponent(p.id)}/images/${encodeURIComponent(p.images[0])}`
          : "";
        a.innerHTML = `
          <div class="thumb" ${img ? `style="background-image:url('${img}'); background-color:#fff;"` : ""}>
            ${img ? "" : "no image"}
          </div>
          <div class="info">
            <div class="name">${p.name || "(unnamed)"}</div>
            ${p.number ? `<div class="num">${p.number}</div>` : ""}
            ${p.description ? `<div class="desc">${p.description}</div>` : ""}
          </div>
        `;
        grid.appendChild(a);
      });
    }

    searchEl.addEventListener("input", () => {
      const pos = searchEl.selectionStart;
      searchEl.value = searchEl.value.toUpperCase();
      try { searchEl.setSelectionRange(pos, pos); } catch (_) {}
      render();
    });

    async function load() {
      try {
        const res = await fetch("/api/parts");
        const data = await res.json();
        parts = data.items || [];
        render();
      } catch (e) {
        statusEl.textContent = "Error: " + e;
      }
    }
    load();
  </script>
</body>

</html>
