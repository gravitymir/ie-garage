<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Part - Cleere Auto Services</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;900&display=swap" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "JetBrains Mono", monospace;
      margin: 0; padding: 20px;
      color: #111; background: #f5f5f5;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .topbar h1 { margin: 0; font-size: 1.4rem; }
    a.home { text-decoration: none; color: #3275ac; font-weight: 600; }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 16px;
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }
    .card {
      background: #fff; border: 1px solid #ccc; border-radius: 8px;
      padding: 14px;
    }
    .card h2 { margin: 0 0 10px; font-size: 1rem; color: #555; }
    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    .field label { font-size: 12px; color: #555; }
    input[type="text"], textarea {
      font-family: inherit; padding: 6px 8px; border: 1px solid #bbb;
      border-radius: 4px; font-size: 14px; width: 100%;
    }
    textarea { min-height: 80px; resize: vertical; }
    button {
      font-family: inherit; padding: 8px 14px;
      border: 1px solid #3275ac; background: #3275ac; color: #fff;
      border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    button.secondary { background: #fff; color: #3275ac; }
    button.danger { background: #c33; border-color: #c33; }
    button:hover { opacity: 0.9; }
    .row-btns { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }

    .status { font-size: 13px; color: #555; margin: 6px 0; }
    .status.err { color: #c33; }
    .status.ok { color: #393; }

    .images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }
    .img-wrap {
      position: relative;
      aspect-ratio: 1;
      background: #eee center/cover no-repeat;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
    .img-wrap button {
      position: absolute; top: 4px; right: 4px;
      padding: 2px 6px; font-size: 11px;
      background: rgba(204,51,51,0.9); border-color: rgba(204,51,51,0.9);
    }
    .drop-zone {
      border: 2px dashed #bbb;
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      color: #777;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .drop-zone.hover { border-color: #3275ac; background: #f0f6fb; }
  </style>
  <script src="/overlay.js"></script>  <script src="/auth.js"></script>  <script src="/chat.js"></script>
</head>

<body>
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <a href="/index.html" style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid #3275ac; border-radius:4px; color:#3275ac; text-decoration:none; font-weight:600;">&larr; Home</a>
      <a href="/parts.html" style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid #3275ac; border-radius:4px; color:#3275ac; text-decoration:none; font-weight:600;">&larr; All Parts</a>
      <h1 id="title">Add Part</h1>
    </div>
  </div>

  <div class="layout">
    <div class="card">
      <h2>Details</h2>
      <div class="field">
        <label>Name</label>
        <input type="text" id="name" placeholder="Brake pads (front)" />
      </div>
      <div class="field">
        <label>Part number</label>
        <input type="text" id="number" placeholder="GDB1234" />
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="description"></textarea>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="notes"></textarea>
      </div>
      <div class="row-btns">
        <button id="save-btn">Save</button>
        <button class="danger" id="delete-btn" style="display:none;">Delete part</button>
      </div>
      <div class="status" id="part-status"></div>
    </div>

    <div class="card">
      <h2>Images</h2>
      <div id="image-section" style="display:none;">
        <div class="drop-zone" id="drop">
          Drop image here, or <u>click to upload</u>
          <input type="file" id="file-input" accept="image/*" multiple style="display:none;" />
        </div>
        <div class="status" id="upload-status"></div>
        <div class="images" id="images"></div>
      </div>
      <div id="image-hint" class="status">Save the part first to enable image uploads.</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    let partId = params.get("id") || "";
    let images = [];

    const partStatus = document.getElementById("part-status");
    const uploadStatus = document.getElementById("upload-status");
    const titleEl = document.getElementById("title");
    const deleteBtn = document.getElementById("delete-btn");
    const imgSection = document.getElementById("image-section");
    const imgHint = document.getElementById("image-hint");

    function applyMode() {
      if (partId) {
        titleEl.textContent = "Edit Part";
        deleteBtn.style.display = "";
        imgSection.style.display = "";
        imgHint.style.display = "none";
      } else {
        titleEl.textContent = "Add Part";
        deleteBtn.style.display = "none";
        imgSection.style.display = "none";
        imgHint.style.display = "";
      }
    }

    async function load() {
      applyMode();
      if (!partId) return;
      try {
        const res = await fetch(`/api/parts/${encodeURIComponent(partId)}`);
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        document.getElementById("name").value = data.name || "";
        document.getElementById("number").value = data.number || "";
        document.getElementById("description").value = data.description || "";
        document.getElementById("notes").value = data.notes || "";
        images = data.images || [];
        renderImages();
      } catch (e) {
        partStatus.textContent = "Error: " + e.message;
        partStatus.className = "status err";
      }
    }

    function renderImages() {
      const wrap = document.getElementById("images");
      wrap.innerHTML = "";
      if (!images.length) {
        wrap.innerHTML = `<div class="status">No images yet.</div>`;
        return;
      }
      images.forEach(name => {
        const div = document.createElement("div");
        div.className = "img-wrap";
        const src = `/parts-files/${encodeURIComponent(partId)}/images/${encodeURIComponent(name)}`;
        div.style.backgroundImage = `url('${src}')`;
        div.innerHTML = `<button data-name="${name}">x</button>`;
        div.querySelector("button").addEventListener("click", async () => {
          if (!confirm("Delete image?")) return;
          await fetch(`/api/parts/${encodeURIComponent(partId)}/images/${encodeURIComponent(name)}`, { method: "DELETE" });
          images = images.filter(n => n !== name);
          renderImages();
        });
        wrap.appendChild(div);
      });
    }

    document.getElementById("save-btn").addEventListener("click", async () => {
      partStatus.textContent = "Saving...";
      partStatus.className = "status";
      const body = {
        name: document.getElementById("name").value.trim(),
        number: document.getElementById("number").value.trim(),
        description: document.getElementById("description").value,
        notes: document.getElementById("notes").value,
      };
      showOverlay("Saving…");
      try {
        let res;
        if (partId) {
          res = await fetch(`/api/parts/${encodeURIComponent(partId)}`, {
            method: "PUT",
            headers: {"content-type": "application/json"},
            body: JSON.stringify(body),
          });
        } else {
          res = await fetch(`/api/parts`, {
            method: "POST",
            headers: {"content-type": "application/json"},
            body: JSON.stringify(body),
          });
        }
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        if (!partId && data.id) {
          partId = data.id;
          const url = new URL(window.location);
          url.searchParams.set("id", partId);
          window.history.replaceState({}, "", url);
          applyMode();
        }
        partStatus.textContent = "Saved.";
        partStatus.className = "status ok";
        setTimeout(() => { partStatus.textContent = ""; }, 1500);
      } catch (e) {
        partStatus.textContent = "Error: " + e.message;
        partStatus.className = "status err";
      } finally {
        hideOverlay();
      }
    });

    deleteBtn.addEventListener("click", async () => {
      if (!confirm("Delete this part and all its images?")) return;
      showOverlay("Deleting…");
      try {
        await fetch(`/api/parts/${encodeURIComponent(partId)}`, { method: "DELETE" });
      } finally {
        hideOverlay();
      }
      window.location.href = "/parts.html";
    });

    // Image upload
    const dropZone = document.getElementById("drop");
    const fileInput = document.getElementById("file-input");
    dropZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => handleFiles(e.target.files));
    ["dragenter", "dragover"].forEach(ev => {
      dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.add("hover"); });
    });
    ["dragleave", "drop"].forEach(ev => {
      dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.remove("hover"); });
    });
    dropZone.addEventListener("drop", (e) => handleFiles(e.dataTransfer.files));

    async function handleFiles(files) {
      if (!partId) {
        uploadStatus.textContent = "Save the part first.";
        uploadStatus.className = "status err";
        return;
      }
      for (const f of files) {
        if (!f.type.startsWith("image/")) continue;
        uploadStatus.textContent = `Uploading ${f.name}...`;
        uploadStatus.className = "status";
        showOverlay(`Uploading ${f.name}…`);
        try {
          const b64 = await fileToBase64(f);
          const res = await fetch(`/api/parts/${encodeURIComponent(partId)}/images`, {
            method: "POST",
            headers: {"content-type": "application/json"},
            body: JSON.stringify({ filename: f.name, data_base64: b64 }),
          });
          if (!res.ok) throw new Error(await res.text());
          const data = await res.json();
          images.push(data.filename);
          renderImages();
          uploadStatus.textContent = `Uploaded ${f.name}.`;
          uploadStatus.className = "status ok";
        } catch (e) {
          uploadStatus.textContent = "Error: " + e.message;
          uploadStatus.className = "status err";
        } finally {
          hideOverlay();
        }
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    load();
  </script>
</body>

</html>
