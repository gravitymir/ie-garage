<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cleere Auto Services</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;900&display=swap" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "JetBrains Mono", monospace;
      margin: 0;
      padding: 24px;
      color: #111;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .clock {
      display: flex;
      flex-wrap: wrap;
      gap: 0 0.4em;
      font-size: 4rem;
      line-height: 1.05;
      font-weight: 900;
      color: #3275ac;
      justify-content: center;
      align-items: center;
    }
    .clock .clock-date,
    .clock .clock-time {
      white-space: nowrap;
    }
    @media (min-width: 1200px) {
      .clock { font-size: 8rem; }
    }
    @media (max-width: 999px) {
      .clock { font-size: 4rem; }
    }
    @media (max-width: 799px) {
      .clock { font-size: 3rem; }
    }
    @media (max-width: 600px) {
      .clock { flex-direction: column; gap: 0; }
    }
    @media (max-width: 480px) {
      .clock { font-size: 2rem; }
    }
    .brand {
      text-align: center;
      margin: 16px 0 32px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #666;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      max-width: 980px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border: 2px solid #bbb;
      border-radius: 12px;
      padding: 32px 20px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: #3275ac;
      box-shadow: 0 4px 14px rgba(50,117,172,0.18);
    }
    .card .icon {
      font-size: 3rem;
      font-weight: 900;
      color: #3275ac;
      margin-bottom: 12px;
    }
    .card .label {
      font-size: 1.4rem;
      font-weight: 600;
    }
    .card .desc {
      font-size: 0.9rem;
      color: #666;
      margin-top: 6px;
      text-align: center;
    }
    .stats {
      max-width: 980px;
      margin: 24px auto 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .stat {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px 16px;
      text-align: center;
    }
    .stat .n {
      font-size: 1.8rem;
      font-weight: 900;
      color: #3275ac;
    }
    .stat .l {
      font-size: 0.85rem;
      color: #666;
    }
    /* Fullscreen screensaver — shown after N minutes of no activity when a
       company logo has been uploaded in Settings. Any mouse/keyboard input
       hides it. Kept inside index.html because this is the only page where
       the machine is likely to sit idle. */
    #screensaver {
      position: fixed; inset: 0;
      display: none;
      background: #000; /* JS overrides from settings.screensaver_bg_color */
      z-index: 9999;
      cursor: none;
    }
    #screensaver.on { display: block; }
    /* Radial-gradient mask feathers the logo's own rectangle into the
       background so we don't see a hard image edge. Combined with a
       background colour that matches the logo's inside, the boundary
       becomes invisible; with any other colour it becomes a soft fade. */
    #screensaver img {
      position: absolute; inset: 0;
      margin: auto;
      max-width: 90vw; max-height: 90vh;
      width: auto; height: auto;
      object-fit: contain;
      -webkit-mask-image: radial-gradient(ellipse at center, black 55%, transparent 92%);
              mask-image: radial-gradient(ellipse at center, black 55%, transparent 92%);
    }
  </style>
  <script src="/overlay.js"></script>  <script src="/auth.js"></script>  <script src="/chat.js"></script>
</head>

<body>
  <div id="screensaver"><img id="screensaver-logo" alt="" /></div>

  <div class="clock" id="clock"></div>
  <div class="brand" id="brand">Cleere Auto Services</div>

  <div class="cards">
    <a class="card" href="/cars.html">
      <div class="icon">CAR</div>
      <div class="label">Cars</div>
      <div class="desc">Vehicles, oil archive, history</div>
    </a>
    <a class="card" href="/jobs.html">
      <div class="icon">JOB</div>
      <div class="label">Jobs</div>
      <div class="desc">All service records</div>
    </a>
    <a class="card" href="/store.html">
      <div class="icon">STR</div>
      <div class="label">Store</div>
      <div class="desc">Inventory by division</div>
    </a>
    <a class="card" href="/settings.html">
      <div class="icon">SET</div>
      <div class="label">Settings</div>
      <div class="desc">Branding, screensaver, print</div>
    </a>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="n-cars">-</div><div class="l">cars</div></div>
    <div class="stat"><div class="n" id="n-jobs">-</div><div class="l">jobs</div></div>
    <div class="stat"><div class="n" id="n-store">-</div><div class="l">in store</div></div>
    <div class="stat"><div class="n" id="n-low">-</div><div class="l">low stock</div></div>
    <div class="stat"><div class="n" id="n-autofill">-</div><div class="l">autofill rules</div></div>
  </div>

  <script>
    const clockEl = document.getElementById("clock");
    function pad(n) { return String(n).padStart(2, "0"); }
    function tick() {
      const d = new Date();
      const date = `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;
      const time = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      clockEl.innerHTML = `<span class="clock-date">${date}</span><span class="clock-time">${time}</span>`;
    }
    tick();
    setInterval(tick, 1000);

    async function count(url, target) {
      try {
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById(target).textContent = (data.items || []).length;
      } catch (_) {}
    }
    count("/api/cars", "n-cars");
    count("/api/jobs", "n-jobs");
    count("/api/autofill/rules", "n-autofill");

    async function storeStats() {
      try {
        const res = await fetch("/api/store/items");
        const data = await res.json();
        const items = data.items || [];
        document.getElementById("n-store").textContent = items.length;
        const low = items.filter(it => {
          const cur = Number(it.current_count || 0);
          const min = Number(it.min_count || 0);
          return min > 0 && cur < min;
        }).length;
        const el = document.getElementById("n-low");
        el.textContent = low;
        if (low > 0) el.style.color = "#c33";
      } catch (_) {}
    }
    storeStats();

    // ---------- Settings-driven branding + screensaver ----------
    // Fetch settings once at page load. If a company_name is set, override
    // the header and page title. If a logo is uploaded AND screensaver is
    // enabled, arm the idle-timer overlay.
    (async () => {
      let s = null;
      try {
        const res = await fetch("/api/settings");
        if (res.ok) s = await res.json();
      } catch (_) {}
      if (!s) return;

      // Branding — override the "Cleere Auto Services" title/header if the
      // user set a custom company name. Leaves the defaults untouched
      // otherwise so a fresh install still looks branded.
      const name = String(s.company_name || "").trim();
      if (name) {
        document.getElementById("brand").textContent = name;
        document.title = name;
      }

      // Screensaver — only arms when a logo file is on disk AND the toggle
      // is on. Idle threshold comes from settings; default 10 min.
      if (!(s.has_logo && s.screensaver_enabled)) return;
      // Floor is 1 minute — this is minutes-not-seconds, so a higher floor
      // would silently ignore the user's setting.
      const idleMs = Math.max(1, Number(s.screensaver_idle_minutes) || 10) * 60 * 1000;

      const overlay = document.getElementById("screensaver");
      const img = document.getElementById("screensaver-logo");
      img.src = "/api/settings/logo?v=" + Date.now();
      // Background around the logo — from settings. Validate the hex so a
      // malformed value can't inject arbitrary CSS via style.background.
      const bg = String(s.screensaver_bg_color || "#000000");
      overlay.style.background = /^#[0-9a-f]{6}$/i.test(bg) ? bg : "#000000";

      let lastActivity = Date.now();
      const bump = () => {
        lastActivity = Date.now();
        if (overlay.classList.contains("on")) overlay.classList.remove("on");
      };
      ["mousemove", "mousedown", "keydown", "touchstart", "wheel"].forEach(evt =>
        window.addEventListener(evt, bump, { passive: true })
      );
      // Clicking the overlay itself should also dismiss it.
      overlay.addEventListener("click", bump);

      setInterval(() => {
        if (Date.now() - lastActivity >= idleMs && !overlay.classList.contains("on")) {
          overlay.classList.add("on");
        }
      }, 1000);
    })();
  </script>
</body>

</html>
