<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cleere Auto Services</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;900&display=swap" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "JetBrains Mono", monospace;
      margin: 0;
      padding: 24px;
      color: #111;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .clock {
      display: flex;
      flex-wrap: wrap;
      gap: 0 0.4em;
      font-size: 4rem;
      line-height: 1.05;
      font-weight: 900;
      color: #3275ac;
      justify-content: center;
      align-items: center;
    }
    .clock .clock-date,
    .clock .clock-time {
      white-space: nowrap;
    }
    @media (min-width: 1200px) {
      .clock { font-size: 8rem; }
    }
    @media (max-width: 999px) {
      .clock { font-size: 4rem; }
    }
    @media (max-width: 799px) {
      .clock { font-size: 3rem; }
    }
    @media (max-width: 600px) {
      .clock { flex-direction: column; gap: 0; }
    }
    @media (max-width: 480px) {
      .clock { font-size: 2rem; }
    }
    .brand {
      text-align: center;
      margin: 16px 0 32px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #666;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      max-width: 980px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border: 2px solid #bbb;
      border-radius: 12px;
      padding: 32px 20px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: #3275ac;
      box-shadow: 0 4px 14px rgba(50,117,172,0.18);
    }
    .card .icon {
      font-size: 3rem;
      font-weight: 900;
      color: #3275ac;
      margin-bottom: 12px;
    }
    .card .label {
      font-size: 1.4rem;
      font-weight: 600;
    }
    .card .desc {
      font-size: 0.9rem;
      color: #666;
      margin-top: 6px;
      text-align: center;
    }
    .stats {
      max-width: 980px;
      margin: 24px auto 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .stat {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px 16px;
      text-align: center;
    }
    .stat .n {
      font-size: 1.8rem;
      font-weight: 900;
      color: #3275ac;
    }
    .stat .l {
      font-size: 0.85rem;
      color: #666;
    }
  </style>
  <script src="/overlay.js"></script>  <script src="/auth.js"></script>  <script src="/chat.js"></script>
</head>

<body>
  <div class="clock" id="clock"></div>
  <div class="brand">Cleere Auto Services</div>

  <div class="cards">
    <a class="card" href="/cars.html">
      <div class="icon">CAR</div>
      <div class="label">Cars</div>
      <div class="desc">Vehicles, oil archive, history</div>
    </a>
    <a class="card" href="/jobs.html">
      <div class="icon">JOB</div>
      <div class="label">Jobs</div>
      <div class="desc">All service records</div>
    </a>
    <a class="card" href="/parts.html">
      <div class="icon">PRT</div>
      <div class="label">Parts</div>
      <div class="desc">Catalog with images</div>
    </a>
    <a class="card" href="/store.html">
      <div class="icon">STR</div>
      <div class="label">Store</div>
      <div class="desc">Inventory by division</div>
    </a>
    <a class="card" href="/workers.html">
      <div class="icon">WRK</div>
      <div class="label">Workers</div>
      <div class="desc">Staff and employees</div>
    </a>
    <a class="card" href="/autofill.html">
      <div class="icon">AUT</div>
      <div class="label">Autofill</div>
      <div class="desc">Work → parts templates</div>
    </a>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="n-cars">-</div><div class="l">cars</div></div>
    <div class="stat"><div class="n" id="n-jobs">-</div><div class="l">jobs</div></div>
    <div class="stat"><div class="n" id="n-parts">-</div><div class="l">parts</div></div>
    <div class="stat"><div class="n" id="n-store">-</div><div class="l">in store</div></div>
    <div class="stat"><div class="n" id="n-low">-</div><div class="l">low stock</div></div>
    <div class="stat"><div class="n" id="n-autofill">-</div><div class="l">autofill rules</div></div>
  </div>

  <script>
    const clockEl = document.getElementById("clock");
    function pad(n) { return String(n).padStart(2, "0"); }
    function tick() {
      const d = new Date();
      const date = `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;
      const time = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      clockEl.innerHTML = `<span class="clock-date">${date}</span><span class="clock-time">${time}</span>`;
    }
    tick();
    setInterval(tick, 1000);

    async function count(url, target) {
      try {
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById(target).textContent = (data.items || []).length;
      } catch (_) {}
    }
    count("/api/cars", "n-cars");
    count("/api/jobs", "n-jobs");
    count("/api/parts", "n-parts");
    count("/api/autofill/rules", "n-autofill");

    async function storeStats() {
      try {
        const res = await fetch("/api/store/items");
        const data = await res.json();
        const items = data.items || [];
        document.getElementById("n-store").textContent = items.length;
        const low = items.filter(it => {
          const cur = Number(it.current_count || 0);
          const min = Number(it.min_count || 0);
          return min > 0 && cur < min;
        }).length;
        const el = document.getElementById("n-low");
        el.textContent = low;
        if (low > 0) el.style.color = "#c33";
      } catch (_) {}
    }
    storeStats();
  </script>
</body>

</html>
