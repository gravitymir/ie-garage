<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Print - Settings - Cleere Auto Services</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;900&display=swap" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "JetBrains Mono", monospace;
      margin: 0; padding: 20px;
      color: #111; background: #f5f5f5;
    }
    .topbar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .topbar h1 { margin: 0; font-size: 1.4rem; }
    a.home {
      text-decoration: none; color: #3275ac; font-weight: 600;
      padding: 6px 12px; border: 1px solid #3275ac; border-radius: 4px;
    }
    .card {
      background: #fff; border: 1px solid #ccc; border-radius: 8px;
      padding: 20px; margin-bottom: 16px;
    }
    .card h2 { margin: 0 0 14px; font-size: 1.1rem; color: #3275ac; }
    .toggle {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 14px; margin-bottom: 12px; cursor: pointer;
    }
    .toggle input { width: 18px; height: 18px; }
    .actions { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
    button {
      font-family: inherit; padding: 10px 18px;
      border: 1px solid #3275ac; border-radius: 4px;
      cursor: pointer; font-size: 14px;
    }
    button.primary { background: #3275ac; color: #fff; }
    button.primary:hover { opacity: 0.9; }
    .help {
      font-size: 12px; color: #666; margin: 8px 0 0;
      background: #f5f5f5; padding: 10px; border-radius: 4px;
      border-left: 3px solid #3275ac;
    }
    .toast {
      padding: 10px 14px; border-radius: 6px;
      margin-bottom: 12px; font-size: 13px;
    }
    .toast.ok  { background: #dff2df; color: #1a5d1a; border: 1px solid #1a7a1a; }
    .toast.err { background: #fbe6e6; color: #8b1a1a; border: 1px solid #c0392b; }
  </style>
  <script src="/overlay.js"></script>
  <script src="/auth.js"></script>
  <script src="/chat.js"></script>
  <script src="/save-feedback.js"></script>
</head>

<body>
  <div class="topbar">
    <a class="home" href="/index.html">&larr; Home</a>
    <a class="home" href="/settings.html">&larr; Settings</a>
    <h1>Print</h1>
  </div>

  <div id="toast-holder"></div>

  <div class="card">
    <h2>Job printout header</h2>
    <label class="toggle">
      <input type="checkbox" id="print_show_logo" />
      <span>Show company logo on printed job forms</span>
    </label>
    <div class="help">
      When enabled, the logo (uploaded in
      <a href="/settings-branding.html">Branding</a>) appears at the top of
      each printed job form, next to the company name.
    </div>
    <div class="actions" style="margin-top:14px;">
      <button class="primary" id="save-btn">Save</button>
    </div>
  </div>

  <script>
    const toastHolder = document.getElementById("toast-holder");
    function toast(kind, msg) {
      const t = document.createElement("div");
      t.className = "toast " + kind;
      t.textContent = msg;
      toastHolder.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }

    async function load() {
      try {
        const res = await fetch("/api/settings");
        const s = await res.json();
        document.getElementById("print_show_logo").checked = s.print_show_logo !== false;
      } catch (e) {
        toast("err", "Could not load settings: " + e.message);
      }
    }

    document.getElementById("save-btn").addEventListener("click", async () => {
      const btn = document.getElementById("save-btn");
      const body = {
        print_show_logo: document.getElementById("print_show_logo").checked,
      };
      try {
        const res = await fetch("/api/settings", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error(await res.text());
        flashSaveStatus(btn, "ok");
      } catch (_) {
        flashSaveStatus(btn, "err");
      }
    });

    load();
  </script>
</body>

</html>
