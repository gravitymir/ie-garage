<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Divisions - Store - Cleere Auto Services</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;900&display=swap" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "JetBrains Mono", monospace;
      margin: 0; padding: 20px;
      color: #111; background: #f5f5f5;
    }
    .topbar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .topbar h1 { margin: 0; font-size: 1.4rem; }
    a.home {
      text-decoration: none; color: #3275ac; font-weight: 600;
      padding: 6px 12px; border: 1px solid #3275ac; border-radius: 4px;
    }

    /* Add-form card at the top — same style as workers add flow. */
    .add-card {
      background: #fff; border: 1px solid #ccc; border-radius: 8px;
      padding: 16px 20px; margin-bottom: 16px;
    }
    .add-row {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .add-row input {
      font-family: inherit; padding: 10px 12px; font-size: 14px;
      border: 1px solid #bbb; border-radius: 4px;
      flex: 1; min-width: 220px;
    }
    button {
      font-family: inherit; padding: 10px 18px;
      border: 1px solid #3275ac; border-radius: 4px;
      cursor: pointer; font-size: 14px;
    }
    button.primary { background: #3275ac; color: #fff; }
    button.primary:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Card grid — mirrors cars.html layout. */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .div {
      background: #fff; border: 1px solid #ccc; border-radius: 8px;
      padding: 14px; text-decoration: none; color: inherit;
      display: flex; gap: 12px; align-items: stretch;
      transition: transform 0.1s, border-color 0.1s;
      position: relative;
      min-height: 96px;
    }
    .div:hover {
      border-color: #3275ac;
      transform: translateY(-1px);
      z-index: 100;
    }
    .div .info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .div .thumb-small {
      flex: 0 0 auto;
      align-self: stretch;
      width: 90px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #bbb;
      background: #fff;
      pointer-events: none;
    }
    .div .thumb-none {
      flex: 0 0 auto;
      align-self: stretch;
      width: 90px;
      border-radius: 4px;
      border: 1px dashed #bbb;
      background: #fafafa;
      color: #999;
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      text-align: center; line-height: 1.1;
      pointer-events: none;
    }
    /* Big hover popup showing the photo full-size + a caption strip with
       the division's name underneath — same layout as the cars hover
       preview on /cars.html so the two lists feel like siblings. Only
       rendered when the division actually has a photo. */
    .div .thumb-big {
      position: absolute;
      top: -8px;
      left: 50%;
      width: 460px;
      max-width: 92vw;
      border-radius: 8px;
      border: 1px solid #888;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
      opacity: 0;
      transform: translateX(-50%) scale(0.92);
      transform-origin: top center;
      transition: opacity 0.15s, transform 0.15s;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }
    .div .thumb-big img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }
    .div .thumb-big .thumb-cap {
      padding: 10px 14px 12px;
      background: #fff;
      border-top: 1px solid #e5e5e5;
      text-align: center;
    }
    .div .thumb-big .cap-name {
      font-size: 1.6rem; font-weight: 900;
      color: #3275ac; letter-spacing: 0.03em;
    }
    .div:hover .thumb-big {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .name {
      font-size: 1.2rem; font-weight: 900; color: #3275ac;
      margin-bottom: 4px; letter-spacing: 0.02em;
    }
    .desc {
      font-size: 0.85rem; color: #555;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    }
    .meta {
      font-size: 0.78rem; color: #888;
      margin-top: auto; padding-top: 8px;
      display: flex; justify-content: space-between;
    }

    .muted { color: #666; font-size: 13px; margin: 8px 0; }
    .toast {
      padding: 10px 14px; border-radius: 6px;
      margin-bottom: 12px; font-size: 13px;
    }
    .toast.ok  { background: #dff2df; color: #1a5d1a; border: 1px solid #1a7a1a; }
    .toast.err { background: #fbe6e6; color: #8b1a1a; border: 1px solid #c0392b; }
  </style>
  <script src="/overlay.js"></script>
  <script src="/auth.js"></script>
  <script src="/chat.js"></script>
</head>

<body>
  <div class="topbar">
    <a class="home" href="/index.html">&larr; Home</a>
    <a class="home" href="/store.html">&larr; Store</a>
    <h1>Divisions</h1>
  </div>

  <div id="toast-holder"></div>

  <div class="add-card">
    <div class="add-row">
      <input type="text" id="new-name" placeholder="New division name (e.g. Tires, Oil, Filters…)" autocomplete="off" />
      <button class="primary" id="add-btn">+ Add</button>
    </div>
    <div class="muted">
      Click any card to open its settings (name, description, photo).
    </div>
  </div>

  <div class="muted" id="status">Loading…</div>
  <div class="grid" id="grid"></div>

  <script>
    const toastHolder = document.getElementById("toast-holder");
    const statusEl = document.getElementById("status");
    const grid = document.getElementById("grid");
    const newNameInput = document.getElementById("new-name");
    const addBtn = document.getElementById("add-btn");

    let divisions = [];

    function toast(kind, msg) {
      const t = document.createElement("div");
      t.className = "toast " + kind;
      t.textContent = msg;
      toastHolder.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s == null ? "" : String(s);
      return d.innerHTML;
    }

    function render() {
      grid.innerHTML = "";
      if (!divisions.length) {
        statusEl.textContent = "No divisions yet. Add the first one above.";
        return;
      }
      statusEl.textContent = "";
      divisions.forEach(d => {
        const a = document.createElement("a");
        a.className = "div";
        a.href = `/store-division.html?id=${encodeURIComponent(d.id)}`;
        a.title = d.description || d.name;

        // Cache-buster on the photo URL so a re-uploaded picture shows up
        // immediately after edit — updated_ms is bumped by the backend on
        // every PUT so it's a good key.
        const v = d.updated_ms || 0;
        const photoUrl = `/api/store/divisions/${encodeURIComponent(d.id)}/photo?v=${v}`;

        // Hover preview: full-size photo plus a caption strip with the
        // division name below it — mirrors the cars.html hover so both
        // lists behave the same.
        const thumbHtml = d.has_photo
          ? `<img class="thumb-small" src="${photoUrl}" alt="" />
             <div class="thumb-big">
               <img src="${photoUrl}" alt="" />
               <div class="thumb-cap">
                 <div class="cap-name">${esc(d.name || "(unnamed)")}</div>
               </div>
             </div>`
          : `<div class="thumb-none">no photo</div>`;

        // Photo first, then info — matches the cars.html card layout (thumb
        // on the left, text on the right).
        a.innerHTML = `
          ${thumbHtml}
          <div class="info">
            <div class="name">${esc(d.name || "(unnamed)")}</div>
            <div class="desc">${esc(d.description || "")}</div>
            <div class="meta">
              <span>${d.item_count || 0} item${(d.item_count === 1) ? "" : "s"}</span>
            </div>
          </div>
        `;
        grid.appendChild(a);
      });
    }

    async function load() {
      try {
        const res = await fetch("/api/store/divisions");
        const data = await res.json();
        divisions = data.items || [];
        divisions.sort((a, b) => String(a.name || "").localeCompare(String(b.name || "")));
        render();
      } catch (e) {
        statusEl.textContent = "Error loading divisions: " + e.message;
      }
    }

    async function addDivision() {
      const name = newNameInput.value.trim();
      if (!name) return;
      addBtn.disabled = true;
      try {
        const res = await fetch("/api/store/divisions", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ name }),
        });
        if (!res.ok) throw new Error(await res.text());
        const created = await res.json();
        newNameInput.value = "";
        toast("ok", `Added "${name}".`);
        // Jump straight to the new division's edit page so the user can add
        // description and photo while it's fresh in mind.
        if (created && created.id) {
          window.location.href = `/store-division.html?id=${encodeURIComponent(created.id)}`;
        } else {
          await load();
        }
      } catch (e) {
        toast("err", "Add failed: " + e.message);
      } finally {
        addBtn.disabled = false;
      }
    }

    addBtn.addEventListener("click", addDivision);
    newNameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addDivision();
    });

    load();
  </script>
</body>

</html>
