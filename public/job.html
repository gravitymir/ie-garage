<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cleere Auto Services</title>
  <link href="https://fonts.googleapis.com" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" />
  <style>
    html,
    * {
      border: none;
      padding: 0;
      margin: 0;
    }

    body {
      font-family: "JetBrains Mono", monospace;
      color: #111;
      background-color: #fff;
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      align-content: center;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
      height: 6rem;
      font-weight: 900;
      color: #3275ac;
      padding: 0;
      margin: 0;
    }



    .clock {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .page-layout {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    #main-content {
      display: flex;
      flex-direction: row;
      gap: 16px;
      align-items: flex-start;
      width: 100%;
    }

    .print-sheet {
      max-width: 794px;
      flex: 1 1 auto;
    }

    .sidebar {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      flex: 1 1 auto;
    }

    .sidebar h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .sidebar-section {
      margin-bottom: 10px;
    }

    .sidebar-section-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .sidebar-meta {
      font-size: 12px;
      color: #444;
      margin-bottom: 8px;
    }

    .sidebar-product {
      margin: 6px 0;
      padding-bottom: 6px;
      border-bottom: 1px dashed #ddd;
    }

    .sidebar-code {
      font-weight: bold;
    }

    .oil-usage-severe {
      font-size: 11px;
      font-weight: bold;
      color: #c00;
      margin-left: 4px;
    }

    .oil-usage-label {
      font-size: 11px;
      color: #666;
      margin-left: 4px;
    }

    #google-search .google-search-link {
      display: block;
      font-size: 1rem;
      color: #06c;
      text-decoration: none;
      margin: 6px 0;
      font-size: 2rem;
      font-weight: bold;
    }

    #google-search .google-search-link:hover {
      text-decoration: underline;
    }


    #history .history-link {
      display: block;
      font-size: 0.95rem;
      color: #06c;
      text-decoration: none;
      margin: 4px 0;
      font-size: 2rem;
      font-weight: bold;
    }

    #history .history-link:hover {
      text-decoration: underline;
    }

    .oil-severe {
      border-left: 3px solid #c00;
      padding-left: 6px;
    }

    .sidebar-desc {
      font-size: 12px;
      color: #333;
    }

    .sidebar-specs {
      font-size: 11px;
      color: #666;
    }

    .section {
      margin-bottom: 16px;
    }

      margin: 0;

    .grid-2 {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
    }

    .grid-2 .field {
      flex: 1 1 calc(50% - 8px);
      min-width: 260px;
    }

    #list_of_models {
      display: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin: 8px 0 16px;
      background: #fafafa;
    }

    #list_of_models .model-title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    #list_of_models .model-option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 6px 8px;
      margin: 4px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 2rem;
    }

    #list_of_models .model-option:hover {
      background: #e0e0e0;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field label {
      flex: 0 0 120px;
    }

    .field>input,
    .field>select,
    .field>div {
      flex: 1 1 auto;
    }

    .hours-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    .work-hours,
    .work-minutes {
      flex: 1 1 0;
      min-width: 0;
    }

    .field input,
    .field select {
      width: 100%;
      box-sizing: border-box;
    }

    .table-like {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .row {
      display: flex;
      width: 100%;
    }

    .cell {
      border: 1px solid #bbb;
      padding: 0;
      text-align: left;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }

    .row.header .cell {
      background: #d6d6d6;
      font-weight: 600;
      justify-content: center;
      text-align: center;
    }

    .w-num {
      flex: 0 0 32px;
      justify-content: center;
      text-align: center;
    }

    .w-80 {
      flex: 4 1 0;
    }

    .w-20 {
      flex: 1 1 0;
    }

    .w-60 {
      flex: 12 1 0;
    }

    .w-25 {
      flex: 5 1 0;
    }

    .w-15 {
      flex: 3 1 0;
    }

    .work-table .w-80 {
      flex: 4 1 0;
    }

    .work-table .w-20 {
      flex: 1 1 0;
    }

    .parts-table .w-60 {
      flex: 12 1 0;
    }

    .parts-table .w-25 {
      flex: 5 1 0;
    }

    .parts-table .w-15 {
      flex: 3 1 0;
    }

    .w-remove {
      flex: 0 0 90px;
      border: none;
    }

    .btn-row {
      margin-top: 6px;
    }

    .remove-btn {
      padding: 6px 13px;
      font-size: 12px;
    }

    .print-only {
      display: none;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    form {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }

    input[type="text"],
    #mileage-km,
    #mileage-mi {
      padding: 3px 5px;
      font-size: 1rem;
    }

    input[name="work_description[]"],
    input[name="parts_used[]"],
    input[name="notes[]"] {
      max-width: -webkit-fill-available;
      max-width: fill-available;
    }

    #regno {
      width: 23rem;
      font-size: 3rem;
    }

    #vin:invalid,
    #pin-code:invalid {
      background-color: #fcc;
    }

    input,
    textarea,
    select,
    button {
      font-family: inherit;
    }

    .wide-input {
      width: 100%;
      min-width: 0;
    }

    input[type="number"],
    input[type="date"],
    input[type="datetime-local"],
    select {
      padding: 8px 10px;
      font-size: 14px;
      height: 32px;
      box-sizing: border-box;
    }

    #status-field {
      height: auto;
    }

    .cell-flex {
      display: flex;
      align-items: center;
    }

    .sheet-input {
      flex: 1;
      min-width: 0;
    }

    .parts-input {
      text-align: center;
      padding: 3px 5px;
      height: auto;
      line-height: normal;
    }


    .left-input {
      text-align: left;
    }

    .invalid {
      background: #ffb3b3;
    }

    button {
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    .error {
      color: #b00020;
      white-space: pre-wrap;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      overflow: auto;
      font-size: 12px;
    }

    .note {
      font-size: 12px;
      color: #666;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .overlay.active {
      display: flex;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 6px solid #eee;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .uppercase {
      text-transform: uppercase;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @media print {
      body {
        margin: 0;
        padding: 0;
      }

      @page {
        margin: 0;
      }

      .page-layout {
        flex-direction: column;
      }

      .print-sheet {
        max-width: none;
        width: 100%;
        padding: 0;
      }

      .print-sheet {
        max-width: 200mm;
        margin: 0 auto;
      }

      .no-print,
      .note,
      .status,
      .error,
      #results,
      #oil-form,
      h1 {
        display: none !important;
      }

      .print-only {
        display: inline-block !important;
      }

      input.print-only,
      .print-only {
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
        background: transparent !important;
      }

      input.work-hours-text {
        color: #111 !important;
        -webkit-text-fill-color: #111 !important;
        opacity: 1 !important;
        min-width: 96px;
        width: 96px;
        text-align: left;
        margin: 0;
      }

      .sheet-input {
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
        background: transparent !important;
      }

      .print-sheet {
        padding: 12mm;
      }

    }
  </style>
</head>

<body>
  <div class="page-layout">
    <div class="section" id="regno-only">
      <div class="field" style="padding: 10px;">
        <div style="display: flex; gap: 8px; align-items: center;">
          <input id="regno" type="text" class="uppercase" placeholder="number plate" />
          <button type="button" id="regno-ok" class="no-print" style="font-size: 2.6rem;">OK</button>
        </div>
      </div>
      <div id="list_of_models" class="no-print"></div>
    </div>

    <div id="main-content" style="display: none; width: max-content;">
      <div id="wrapper">
        <a href="/database.html" class="btn-link" style="text-decoration: none;">
          <div class="toolbar no-print">
            <div id="clock" class="clock"></div>
          </div>
        </a>
        <div class="print-sheet">
          <datalist id="work-description-options">
            <option value="full service"></option>
            <option value="minor service"></option>
            <option value="replace tire"></option>
            <option value="replace battery"></option>
            <option value="all brake pads"></option>
            <option value="all brake discs"></option>
            <option value="tire"></option>
            <option value="all tires"></option>
            <option value="front brake discs"></option>
            <option value="front brake pads"></option>
            <option value="front tires"></option>
            <option value="drop link"></option>
            <option value="rear tires"></option>
            <option value="rear brake discs"></option>
            <option value="rear brake pads"></option>
            <option value="investigate"></option>
            <option value="fixing"></option>
            <option value="tracking wheels"></option>
            <option value="replace bulb"></option>
          </datalist>
          <div class="section grid-2">
            <div class="field">
              <label for="make">Make:</label>
              <input id="make" type="text" placeholder="Toyota" class="wide-input" />
            </div>
            <div class="field">
              <label for="regno-main">Reg No:</label>
              <div style="display: flex; gap: 8px; align-items: center;">
                <input id="regno-main" type="text" placeholder="241-C-11814" class="wide-input no-print" />
                <button type="button" id="regno-ok-main" class="no-print">OK</button>
                <input id="regno-main-print" type="text" class="wide-input print-only" value="" />
              </div>
            </div>
            <div class="field">
              <label for="model">Model:</label>
              <input id="model" type="text" placeholder="C5, Partner, Jetta" class="wide-input" />
            </div>
            <div class="field">
              <label for="datein">Date in:</label>
              <input id="datein" type="text" placeholder="06.02.2026 19:30" />
            </div>
            <div class="field">
              <label for="mileage-km">Kilomet:</label>
              <div style="display: flex; gap: 8px; align-items: center;">
                <input id="mileage-km" type="number" min="0" class="no-print" />
                <span class="no-print" style="width: 36px; text-align: center;">km</span>
                <input id="mileage-km-print" type="text" class="sheet-input print-only" value="" />
              </div>
            </div>
            <div class="field">
              <label for="mileage-mi">Mileage:</label>
              <div style="display: flex; gap: 8px; align-items: center;">
                <input id="mileage-mi" type="number" min="0" class="no-print" />
                <span class="no-print" style="width: 36px; text-align: center;">mil</span>
                <input id="mileage-mi-print" type="text" class="sheet-input print-only" value="" />
              </div>
            </div>
            <div class="field">
              <label for="vin">VIN: </label>
              <input id="vin" type="text" maxlength="17" placeholder="17chars not I, O, Q" class="wide-input uppercase"
                pattern="[A-HJ-NPR-Za-hj-npr-z0-9]{0,17}" title="17 characters, letters and digits only (no I, O, Q)" />
            </div>
            <div class="field">
              <label for="pin-code">PIN: </label>
              <input id="pin-code" type="text" maxlength="7" placeholder="4–7 digit code" class="wide-input"
                inputmode="numeric" pattern="[0-9]*" title="Digits 0-9 only" />
            </div>
          </div>

          <div class="section">
            <div class="table-like work-table">
              <div class="row header">
                <div class="cell w-num">#</div>
                <div class="cell w-80">work description</div>
                <div class="cell w-20">hours</div>
                <div class="cell w-remove no-print"></div>
              </div>
              <div id="work-body">
                <div class="row">
                  <div class="cell w-num"><span class="row-number">1</span></div>
                  <div class="cell w-80 cell-flex">
                    <input type="text" name="work_description[]" class="sheet-input left-input"
                      list="work-description-options" />
                  </div>
                  <div class="cell w-20">
                    <div class="hours-wrap">
                      <input type="number" min="0" name="work_hours_h[]" class="sheet-input work-hours no-print"
                        value="0" />
                      <input type="number" min="0" step="15" name="work_hours_m[]"
                        class="sheet-input work-minutes no-print" value="0" />
                    </div>
                    <input type="text" name="work_hours_text[]"
                      class="sheet-input print-only work-hours-text print-hide-if-empty center-input" value="" />
                  </div>
                  <div class="cell w-remove no-print">
                    <button type="button" class="remove-btn">Remove</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="table-like parts-table">
              <div class="row header">
                <div class="cell w-num">#</div>
                <div class="cell w-60">parts used</div>
                <div class="cell w-25">number</div>
                <div class="cell w-15">quantity</div>
                <div class="cell w-remove no-print"></div>
              </div>
              <div id="parts-body">
                <div class="row">
                  <div class="cell w-num"><span class="row-number">1</span></div>
                  <div class="cell w-60 cell-flex">
                    <input type="text" name="parts_used[]" class="sheet-input parts-input left-input" />
                  </div>
                  <div class="cell w-25 cell-flex">
                    <input type="text" name="parts_number[]" class="sheet-input parts-input uppercase" />
                  </div>
                  <div class="cell w-15 cell-flex">
                    <input type="text" name="parts_qty[]" class="sheet-input parts-input" />
                  </div>
                  <div class="cell w-remove no-print">
                    <button type="button" class="remove-btn">Remove</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="table-like notes-table">
              <div class="row header">
                <div class="cell w-num">#</div>
                <div class="cell w-80">notes</div>
                <div class="cell w-remove no-print"></div>
              </div>
              <div id="notes-body">
                <div class="row">
                  <div class="cell w-num"><span class="row-number">1</span></div>
                  <div class="cell w-80 cell-flex">
                    <input type="text" name="notes[]" class="sheet-input left-input" />
                  </div>
                  <div class="cell w-remove no-print">
                    <button type="button" class="remove-btn">Remove</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="btn-row no-print">
            <button type="button" id="print-btn">Print</button>
            <button type="button" id="save-btn">Save</button>
          </div>
        </div>
      </div>
      <div class="sidebar no-print" id="sidebar-info">
        <div id="history">

        </div>

        <div id="google-search">

        </div>
        <div id="list-all-oils">

        </div>
        <div id="used_parts_numbers">

        </div>
        <div id="sidebar-content">

        </div>
      </div>
    </div>
  </div>

  <div class="error" id="error"></div>
  <div id="results"></div>


  <div id="loading-overlay" class="overlay no-print" aria-hidden="true">
    <div class="spinner" aria-label="Loading"></div>
  </div>

  <script>
    const API_BASE = "";

    const errorEl = document.getElementById("error");
    const resultsEl = document.getElementById("results");
    const regNoEl = document.getElementById("regno");
    const regNoOkBtn = document.getElementById("regno-ok");
    const regNoMainEl = document.getElementById("regno-main");
    const regNoOkMainBtn = document.getElementById("regno-ok-main");
    const regNoMainPrintEl = document.getElementById("regno-main-print");
    const regNoOnlyEl = document.getElementById("regno-only");
    const mainContentEl = document.getElementById("main-content");
    const makeEl = document.getElementById("make");
    const modelEl = document.getElementById("model");
    const dateInEl = document.getElementById("datein");
    const mileageKmEl = document.getElementById("mileage-km");
    const mileageMiEl = document.getElementById("mileage-mi");
    const mileageKmPrintEl = document.getElementById("mileage-km-print");
    const mileageMiPrintEl = document.getElementById("mileage-mi-print");
    const vinEl = document.getElementById("vin");
    const pinCodeEl = document.getElementById("pin-code");
    const overlayEl = document.getElementById("loading-overlay");
    const addWorkBtn = document.getElementById("add-work");
    const addPartBtn = document.getElementById("add-part");
    const workBody = document.getElementById("work-body");
    const partsBody = document.getElementById("parts-body");
    const notesBody = document.getElementById("notes-body");
    const printBtn = document.getElementById("print-btn");
    const saveBtn = document.getElementById("save-btn");
    const sidebarContentEl = document.getElementById("sidebar-content");
    const clockEl = document.getElementById("clock");
    const modelListEl = document.getElementById("list_of_models");
    let lastStepBJson = null;
    let currentFileName = null;
    let stepAModelText = "";

    function setError(text) {
      errorEl.textContent = text || "";
    }

    function clearResults() {
      resultsEl.innerHTML = "";
    }

    function renderJson(title, json) {
      const card = document.createElement("div");
      card.className = "card";
      const h = document.createElement("strong");
      h.textContent = title;
      const pre = document.createElement("pre");
      pre.textContent = JSON.stringify(json, null, 2);
      card.appendChild(h);
      card.appendChild(pre);
      resultsEl.appendChild(card);
    }

    function renderSummary(stepBJson) {
      const components = stepBJson?.type?.components || [];
      if (!components.length) return;

      const card = document.createElement("div");
      card.className = "card";
      const h = document.createElement("strong");
      h.textContent = "Oil recommendations";
      card.appendChild(h);

      components.forEach((component) => {
        const section = document.createElement("div");
        section.style.marginTop = "10px";

        const title = document.createElement("div");
        title.textContent = component.name || "Component";
        title.style.fontWeight = "bold";
        section.appendChild(title);

        if (Array.isArray(component.capacities) && component.capacities.length) {
          const cap = document.createElement("div");
          cap.textContent =
            "Capacities: " +
            component.capacities
              .map((c) => {
                const cond = c.condition ? ` (${c.condition})` : "";
                return `${c.value} ${c.unit}${cond}`;
              })
              .join(", ");
          section.appendChild(cap);
        }

        if (
          Array.isArray(component.recommendations) &&
          component.recommendations.length
        ) {
          const list = document.createElement("ul");
          component.recommendations.forEach((rec) => {
            const li = document.createElement("li");
            const name =
              rec.product_name ||
              rec.product?.name ||
              rec.product_code ||
              "Product";
            const code = rec.product_code ? ` (${rec.product_code})` : "";
            li.textContent = `${name}${code}`;
            list.appendChild(li);
          });
          section.appendChild(list);
        }

        card.appendChild(section);
      });

      resultsEl.appendChild(card);
    }

    function renderSidebar(stepBJson) {
      const components = stepBJson?.type?.components || [];
      if (!components.length) {
        sidebarContentEl.textContent = "No data.";
        return;
      }
      const container = document.createElement("div");

      const type = stepBJson?.type || {};
      const meta = document.createElement("div");
      meta.className = "sidebar-meta";
      const typeName = type.name || "";
      const yearFrom = type.year_from ? `from ${type.year_from}` : "";
      const code = type.code ? type.code : "";
      const hp = type.hp ? `${type.hp}HP` : "";
      const kw = type.kw ? `${type.kw}KW` : "";
      const rpm = type.rpm ? `${type.rpm}RPM` : "";
      meta.innerHTML = `
          <div><strong>${typeName}</strong></div>
          <div>${[yearFrom, code].filter(Boolean).join(" ")}</div>
          <div>${[hp, kw, rpm].filter(Boolean).join(" , ")}</div>
        `;
      container.appendChild(meta);
      components.forEach((component) => {
        const section = document.createElement("div");
        section.className = "sidebar-section";

        const title = document.createElement("div");
        title.className = "sidebar-section-title";
        title.textContent = component.name || "Component";
        section.appendChild(title);

        if (Array.isArray(component.capacities) && component.capacities.length) {
          component.capacities.forEach((c) => {
            const line = document.createElement("div");
            const label = c.type || "Capacity";
            const cond = c.condition ? ` (${c.condition})` : "";
            line.textContent = `${label}: ${c.value} ${c.unit}${cond}`;
            section.appendChild(line);
          });
        }

        if (Array.isArray(component.recommendations) && component.recommendations.length) {
          component.recommendations.forEach((rec) => {
            const product = rec.product || {};
            const box = document.createElement("div");
            box.className = "sidebar-product";
            const code = rec.product_code || product.code || "";
            const name = rec.product_name || product.name || "Product";
            const desc = product.description_short || "";
            const specs = product.cache_compliance_specifications || "";
            const usage = rec.vehicle_usage ? `Usage: ${rec.vehicle_usage}` : "";
            box.innerHTML = `
                <div class="sidebar-code">${code}</div>
                <div>${name}</div>
                ${desc ? `<div class="sidebar-desc">${desc}</div>` : ""}
                ${specs ? `<div class="sidebar-specs">${specs.replaceAll("\n", ", ")}</div>` : ""}
                ${usage ? `<div class="sidebar-desc">${usage}</div>` : ""}
              `;
            section.appendChild(box);
          });
        }
        container.appendChild(section);
      });
      sidebarContentEl.innerHTML = "";
      sidebarContentEl.appendChild(container);
    }

    function renderAllOils(stepBJson) {
      const listAllOilsEl = document.getElementById("list-all-oils");
      if (!listAllOilsEl) return;
      const components = stepBJson?.type?.components || [];
      const engine = components.find((c) =>
        String(c.name || "").toLowerCase().includes("engine")
      );
      const oilRecs = (engine?.recommendations || []).filter(
        (r) => r.product_category === "motoroil"
      );
      listAllOilsEl.innerHTML = "";
      if (!oilRecs.length) return;
      const byCode = new Map();
      oilRecs.forEach((rec) => {
        const product = rec.product || {};
        const code = String(rec.product_code || product.code || "").trim();
        const name = rec.product_name || product.name || "Product";
        const usage = rec.vehicle_usage === "Severe" ? "Severe" : "Normal";
        if (!byCode.has(code)) {
          byCode.set(code, { code, name, usages: new Set() });
        }
        byCode.get(code).usages.add(usage);
      });
      const title = document.createElement("div");
      title.className = "sidebar-section-title";
      title.textContent = "All oils";
      listAllOilsEl.appendChild(title);
      byCode.forEach(({ code, name, usages }) => {
        const usageList = Array.from(usages).sort().join(", ");
        const hasSevere = usages.has("Severe");
        const box = document.createElement("div");
        box.className = "sidebar-product" + (hasSevere ? " oil-severe" : "");
        const usageHtml = usageList ? ` <span class="oil-usage-label">(${usageList})</span>` : "";
        box.innerHTML = `
            <div class="sidebar-code">${escapeHtmlSidebar(code)}</div>
            <div>${escapeHtmlSidebar(name)}${usageHtml}</div>
          `;
        listAllOilsEl.appendChild(box);
      });
    }

    function escapeHtmlSidebar(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function yearFromRegNo(plate) {
      const digits = String(plate || "").replace(/\D/g, "");
      const firstTwo = digits.slice(0, 2);
      if (firstTwo.length < 2) return "";
      const num = parseInt(firstTwo, 10);
      return num > 70 ? "19" + firstTwo : "20" + firstTwo;
    }

    function normalizeRegNoForMatch(reg) {
      return String(reg || "").replace(/[\s-]/g, "").toUpperCase();
    }

    async function renderHistory(plate) {
      const el = document.getElementById("history");
      if (!el) return;
      el.innerHTML = "";
      const plateNorm = normalizeRegNoForMatch(plate);
      if (!plateNorm) return;
      try {
        const res = await fetch(API_BASE + "/api/list", { credentials: "include" });
        const data = await res.json();
        const items = Array.isArray(data?.items) ? data.items : [];
        const forThisCar = items.filter(
          (item) => normalizeRegNoForMatch(item.reg_no) === plateNorm
        );
        forThisCar.sort((a, b) => (b.modified_ms || 0) - (a.modified_ms || 0));
        const title = document.createElement("div");
        title.className = "sidebar-section-title";
        title.textContent = "History";
        el.appendChild(title);
        if (!forThisCar.length) {
          const empty = document.createElement("div");
          empty.className = "sidebar-desc";
          empty.textContent = "No previous jobs for this car.";
          el.appendChild(empty);
          return;
        }
        forThisCar.forEach((item) => {
          const row = document.createElement("div");
          row.className = "history-item";
          const dateText = item.date_in || "";
          const link = document.createElement("a");
          link.href = "job.html?file=" + encodeURIComponent(item.name);
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.className = "history-link";
          link.textContent = dateText;
          row.appendChild(link);
          el.appendChild(row);
        });
      } catch (err) {
        const errEl = document.createElement("div");
        errEl.className = "sidebar-desc";
        errEl.textContent = "Could not load history.";
        el.appendChild(errEl);
      }
    }

    let usedPartsIndex = new Map();

    function normalizePartName(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/\s+/g, " ")
        .trim();
    }

    function getPartNumberFromMap(used) {
      const key = normalizePartName(used);
      return key ? usedPartsIndex.get(key) || "" : "";
    }

    async function renderUsedPartsNumbers(plate) {
      const el = document.getElementById("used_parts_numbers");
      if (!el) return;
      el.innerHTML = "";
      usedPartsIndex = new Map();
      const plateNorm = normalizeRegNoForMatch(plate);
      if (!plateNorm) return;
      try {
        const res = await fetch(API_BASE + "/api/list", { credentials: "include" });
        const data = await res.json();
        const items = Array.isArray(data?.items) ? data.items : [];
        const forThisCar = items.filter(
          (item) => normalizeRegNoForMatch(item.reg_no) === plateNorm
        );
        forThisCar.sort((a, b) => (b.modified_ms || 0) - (a.modified_ms || 0));
        for (const item of forThisCar) {
          const docRes = await fetch(
            `/api/load?file=${encodeURIComponent(item.name)}`
          );
          const doc = await docRes.json();
          const parts = Array.isArray(doc?.parts) ? doc.parts : [];
          parts.forEach((part) => {
            const used = normalizePartName(part?.used);
            const number = String(part?.number || "").trim();
            if (used && number && !usedPartsIndex.has(used)) {
              usedPartsIndex.set(used, number);
            }
          });
        }
        const title = document.createElement("div");
        title.className = "sidebar-section-title";
        title.textContent = "Previously used parts";
        el.appendChild(title);
        if (!usedPartsIndex.size) {
          const empty = document.createElement("div");
          empty.className = "sidebar-desc";
          empty.textContent = "No parts history.";
          el.appendChild(empty);
          return;
        }
        usedPartsIndex.forEach((number, used) => {
          const row = document.createElement("div");
          row.className = "sidebar-desc";
          row.textContent = `${used} — ${number}`;
          el.appendChild(row);
        });
      } catch (err) {
        const errEl = document.createElement("div");
        errEl.className = "sidebar-desc";
        errEl.textContent = "Could not load used parts.";
        el.appendChild(errEl);
      }
    }

    function renderGoogleSearch(stepBJson, plate, vehicleOverride = null) {
      const el = document.getElementById("google-search");
      if (!el) return;
      const type = stepBJson?.type || {};
      const make = String(
        type.model?.make?.name || vehicleOverride?.make || ""
      ).trim();
      const model = String(
        type.model?.name || vehicleOverride?.model || ""
      ).trim();
      const year = yearFromRegNo(plate) || type.year_from || type.year_until || "";
      const vehicle = [make, model, year].filter(Boolean).join(" ");
      el.innerHTML = "";
      if (!vehicle) return;
      const labels = [
        "where fuel filter",
        "where oil filter",
        "how replace rear brake pads",
        "where obd2",
        "how reset oil service",
        "how reset inspections",
      ];
      const title = document.createElement("div");
      title.className = "sidebar-section-title";
      title.textContent = "Google search";
      el.appendChild(title);
      labels.forEach((label) => {
        const q = label + " on " + vehicle;
        const a = document.createElement("a");
        a.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.className = "google-search-link";
        a.textContent = label;
        el.appendChild(a);
      });
    }

    function normalizePlate(input) {
      return input.trim().toUpperCase();
    }
    function updateClock() {
      if (!clockEl) return;
      const d = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      const day = pad(d.getDate());
      const month = pad(d.getMonth() + 1);
      const year = d.getFullYear();
      const hours = pad(d.getHours());
      const minutes = pad(d.getMinutes());
      const seconds = pad(d.getSeconds());
      clockEl.textContent = `${day}.${month}.${year} ${hours}:${minutes}:${seconds}`;
    }
    function formatIrishPlate(input) {
      const cleaned = String(input).toUpperCase().replace(/[^A-Z0-9]/g, "");
      if (!cleaned) return "";
      const match = cleaned.match(/^(\d{1,3})([A-Z]+)(\d{0,5})$/);
      if (!match) return cleaned;
      const trailing = match[3] || "";
      return trailing ? `${match[1]}-${match[2]}-${trailing}` : `${match[1]}-${match[2]}-`;
    }
    function fillMakeModel(stepBJson) {
      const rawMakeName = stepBJson?.type?.model?.make?.name || "";
      const makeName = String(rawMakeName).split("(")[0].trim();
      const modelName = stepBJson?.type?.model?.name || "";
      if (makeName) makeEl.value = makeName;
      if (!stepAModelText && modelName) modelEl.value = modelName;
    }
    function fillModelFromStepA(stepAJson) {
      const first = Array.isArray(stepAJson) ? stepAJson[0] : stepAJson;
      if (!first) return;
      const modelText = String(first.name || "").trim();
      if (modelText) {
        stepAModelText = modelText;
        modelEl.value = modelText;
      }
    }

    function buildModelLabel(item) {
      const name = String(item?.name || "").trim();
      const yearFrom = item?.year_from;
      const yearUntil = item?.year_until;
      let years = "";
      if (yearFrom && yearUntil) {
        years = `${yearFrom}-${yearUntil}`;
      } else if (yearFrom) {
        years = String(yearFrom);
      } else if (yearUntil) {
        years = String(yearUntil);
      }
      return [name, years].filter(Boolean).join(" ");
    }

    function renderModelList(stepAJson, plate) {
      if (!modelListEl || !Array.isArray(stepAJson) || stepAJson.length <= 1) {
        if (modelListEl) modelListEl.style.display = "none";
        return false;
      }
      modelListEl.innerHTML = "";
      const title = document.createElement("div");
      title.className = "model-title";
      title.textContent = "Select model";
      modelListEl.appendChild(title);
      stepAJson.forEach((item) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "model-option";
        btn.textContent = buildModelLabel(item) || "Model";
        btn.addEventListener("click", () => {
          modelListEl.style.display = "none";
          fillModelFromStepA([item]);
          continueStepB(plate, item);
        });
        modelListEl.appendChild(btn);
      });
      modelListEl.style.display = "block";
      regNoOnlyEl.style.display = "block";
      mainContentEl.style.display = "none";
      return true;
    }

    async function continueStepB(plate, stepAJson) {
      try {
        overlayEl.classList.add("active");
        const token = extractTokenFromStepA(stepAJson);
        if (!token) {
          throw new Error(
            "Could not find a vehicle token in Step A response."
          );
        }
        const stepBJson = await stepB(plate, token);
        lastStepBJson = stepBJson;
        fillMakeModel(stepBJson);
        renderGoogleSearch(stepBJson, plate);
        renderAllOils(stepBJson);
        renderSidebar(stepBJson);
        renderSummary(stepBJson);
        await renderHistory(plate);
        await renderUsedPartsNumbers(plate);
        renderJson("Step B response", stepBJson);
        regNoOnlyEl.style.display = "none";
        mainContentEl.style.display = "flex";
        regNoMainEl.value = plate;
        regNoMainPrintEl.value = plate;
        currentFileName = null;
      } catch (err) {
        setError(String(err));
      } finally {
        overlayEl.classList.remove("active");
      }
    }

    async function fetchJson(url) {
      const res = await fetch(url, {
        method: "GET",
        credentials: "include",
        headers: {
          accept: "application/json, text/javascript, */*; q=0.01",
          "x-requested-with": "XMLHttpRequest",
        },
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`HTTP ${res.status} ${res.statusText}\n${text}`);
      }
      return res.json();
    }

    async function stepA(plate) {
      const url =
        API_BASE +
        `/api/step-a?plate=${encodeURIComponent(plate)}&_=${Date.now()}`;
      return fetchJson(url);
    }

    function extractTokenFromStepA(stepAJson) {
      if (!stepAJson) return null;
      if (Array.isArray(stepAJson) && stepAJson[0]) {
        return (
          stepAJson[0].slug_or_id ||
          stepAJson[0].id ||
          stepAJson[0].slug ||
          stepAJson[0].code ||
          null
        );
      }
      if (stepAJson.slug_or_id) return stepAJson.slug_or_id;
      if (stepAJson.id) return stepAJson.id;
      if (stepAJson.slug) return stepAJson.slug;
      if (stepAJson.code) return stepAJson.code;
      if (stepAJson.data?.slug_or_id) return stepAJson.data.slug_or_id;
      if (stepAJson.data?.id) return stepAJson.data.id;
      if (stepAJson.data?.slug) return stepAJson.data.slug;
      if (stepAJson.data?.code) return stepAJson.data.code;
      return null;
    }

    async function stepB(plate, token) {
      const url =
        API_BASE +
        `/api/step-b?plate=${encodeURIComponent(
          plate
        )}&token=${encodeURIComponent(token)}&_=${Date.now()}`;
      return fetchJson(url);
    }

    async function runLookup(plateValue) {
      const ro = document.getElementById("regno-only");
      ro.style.backgroundImage = "none";
      ro.children[0].style.display = "none";
      setError("");
      clearResults();
      stepAModelText = "";
      const plate = normalizePlate(plateValue);
      if (!plate) {
        setError("Please enter a license plate.");
        return;
      }
      try {
        overlayEl.classList.add("active");
        const stepAJson = await stepA(plate);
        renderJson("Step A response", stepAJson);
        fillModelFromStepA(stepAJson);

        const showList = renderModelList(stepAJson, plate);
        if (showList) return;
        await continueStepB(plate, stepAJson);

      } catch (err) {
        setError(String(err));
      } finally {
        overlayEl.classList.remove("active");
      }
    }


    function setNowLocalDatetime() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      const day = pad(now.getDate());
      const month = pad(now.getMonth() + 1);
      const year = now.getFullYear();
      const hours = pad(now.getHours());
      const minutes = pad(now.getMinutes());
      dateInEl.value = `${day}.${month}.${year} ${hours}:${minutes}`;
    }

    setNowLocalDatetime();

    function parseNumber(value) {
      const num = Number(value);
      return Number.isFinite(num) ? num : null;
    }

    function updateMileageValidity() {
      const kmVal = parseNumber(mileageKmEl.value);
      if (kmVal === null || kmVal < 1) {
        mileageKmEl.classList.add("invalid");
      } else {
        mileageKmEl.classList.remove("invalid");
      }
    }

    let updatingMileage = false;
    const KM_PER_MI = 1.609344;
    function updateMileagePrint() {
      const kmVal = mileageKmEl.value;
      const miVal = mileageMiEl.value;
      mileageKmPrintEl.value = kmVal ? `${kmVal} km` : "";
      mileageMiPrintEl.value = miVal ? `${miVal} mil` : "";
    }

    function updateFieldPrintVisibility() {
      const fields = [vinEl, pinCodeEl];
      fields.forEach((el) => {
        if (!el) return;
        const empty = !String(el.value || "").trim();
        el.classList.toggle("no-print", empty);
        const label = document.querySelector(`label[for="${el.id}"]`);
        if (label) label.classList.toggle("no-print", empty);

      if (!hoursEl || !minutesEl || !textEl) return;
      const hours = Number(hoursEl.value) || 0;

      if (hours === 0 && minutes === 0) {
        textEl.value = "";

      const pad = (n) => String(n).padStart(2, "0");

      textEl.defaultValue = textEl.value;

    function buildCapacityText(component) {
      if (!Array.isArray(component.capacities) || !component.capacities.length) {
        return "";
      }
      const first = component.capacities.find(
        (c) => c.value !== null && c.value !== undefined && c.value !== ""
      );
      return first?.value ? `${first.value} L` : "";
    }

    function addServiceParts(options) {
      const createRow = (used, number, qty) => {
        const mappedNumber = number || getPartNumberFromMap(used);
        const row = document.createElement("div");
        row.className = "row";
        row.setAttribute("data-auto", options.key);
        row.innerHTML =
          `<div class="cell w-num"><span class="row-number"></span></div>` +
          `<div class="cell w-60 cell-flex"><input type="text" name="parts_used[]" class="sheet-input parts-input left-input" value="${used}" /></div>` +
          `<div class="cell w-25 cell-flex"><input type="text" name="parts_number[]" class="sheet-input parts-input uppercase" value="${mappedNumber}" /></div>` +
          `<div class="cell w-15 cell-flex"><input type="text" name="parts_qty[]" class="sheet-input parts-input" value="${qty}" /></div>` +
          '<div class="cell w-remove no-print"><button type="button" class="remove-btn">Remove</button></div>';
        return row;
      };
      const existing = partsBody.querySelectorAll(
        `.row[data-auto="${options.key}"]`
      );
      existing.forEach((row) => row.remove());

      let oilsForParts = [];
      let capacityText = "";
      if (lastStepBJson) {
        const components = lastStepBJson?.type?.components || [];
        const engine = components.find((c) =>
          String(c.name || "").toLowerCase().includes("engine")
        );
        if (engine) {
          const oilRecs = (engine.recommendations || []).filter(
            (r) => r.product_category === "motoroil"
          );
          const normalOnly = oilRecs.filter(
            (r) => !r.vehicle_usage || String(r.vehicle_usage).toLowerCase() === "normal"
          );
          oilsForParts = normalOnly.length ? normalOnly : oilRecs;
          capacityText = buildCapacityText(engine);
        }
      }
      const parseOil = (rec) => {
        const fullName =
          rec?.product_name || rec?.product?.name || rec?.product_code || "";
        const productCode = String(rec?.product_code || rec?.product?.code || "").trim();
        const nameParts = String(fullName).split(" ");
        const gradeMatch = String(fullName).match(/\b\d{1,2}W-\d{2}\b/);
        let oilType = nameParts
          .filter((p) => !/^\d{1,2}W-\d{2}$/.test(p))
          .join(" ")
          .replace(/\s+/g, " ")
          .trim();
        oilType = oilType.replace(/\s*Premium Synthetic\s*/gi, " ").replace(/\s+/g, " ").trim();
        oilType = oilType.replace(/^Motor Oil\b/i, "motor oil");
        const grade = gradeMatch ? gradeMatch[0] : "";
        return { oilType, grade, productCode };
      };

      const rowsToAdd = [];
      const seenOil = new Set();
      if (oilsForParts.length) {
        oilsForParts.forEach((rec) => {
          const { oilType, grade, productCode } = parseOil(rec);
          const key = productCode || `${oilType}|${grade}`;
          if (seenOil.has(key)) return;
          seenOil.add(key);
          const partNumber = grade || productCode;
          rowsToAdd.push(createRow(oilType, partNumber, capacityText));
        });
        const type = lastStepBJson?.type;
        const yearUntil = type?.year_until != null ? Number(type.year_until) : null;
        const regNo = regNoMainEl?.value || "";
        const regYearStr = yearFromRegNo(regNo);
        const regYear = regYearStr ? parseInt(regYearStr, 10) : NaN;
        const isPre2020 = !isNaN(regYear) ? regYear < 2020 : (yearUntil == null || yearUntil < 2020);
        if (isPre2020) {
          rowsToAdd.push(createRow("motor oil GB", "5W-30", capacityText || ""));
        }
      }
      if (options.includeOilFilter) rowsToAdd.push(createRow("oil filter", "", "1 pcs"));
      if (options.includeAirFilter) rowsToAdd.push(createRow("air filter", "", "1 pcs"));
      if (options.includeFuelFilter) rowsToAdd.push(createRow("fuel filter", "", "1 pcs"));

      const insertBefore = partsBody.firstElementChild;
      rowsToAdd.forEach((row) => {
        if (insertBefore) {
          partsBody.insertBefore(row, insertBefore);
        } else {
          partsBody.appendChild(row);
        }
      });
      updateRemoveButtons(partsBody);
      updateRowNumbers(partsBody);
    }

      updateRowPrintVisibility(notesBody);
    });

    updateRowPrintVisibility(workBody);
    updateRowPrintVisibility(partsBody);
    updateRowPrintVisibility(notesBody);
    updateFieldPrintVisibility();
    window.addEventListener("beforeprint", () => {
      updateAllWorkText();
      updateRowPrintVisibility(workBody);
      updateRowPrintVisibility(partsBody);
      updateRowPrintVisibility(notesBody);
      updateFieldPrintVisibility();
      updateRowNumbers(workBody);
      updateRowNumbers(partsBody);
      updateRowNumbers(notesBody);
    });

    if (printBtn) {
      printBtn.addEventListener("click", () => {
        updateAllWorkText();
        updateRowPrintVisibility(workBody);
        updateRowPrintVisibility(partsBody);
        updateRowPrintVisibility(notesBody);
        window.print();
      });
    }
    if (saveBtn) {
      saveBtn.addEventListener("click", async () => {
        if (saveBtn.disabled) return;
        saveBtn.disabled = true;
        const clean = (v) => String(v || "").trim();
        const valueOrEmpty = (el) => (el ? clean(el.value) : "");
        const readRows = (tbody, keyName) => {
          const rows = Array.from(tbody.querySelectorAll(".row"));
          return rows
            .map((row) => {
              const keyEl = row.querySelector(`input[name="${keyName}"]`);
              if (!keyEl) return null;
              const keyVal = clean(keyEl.value);
              if (!keyVal) return null;
              if (keyName === "work_description[]") {
                return {
                  description: keyVal,
                  hours: valueOrEmpty(row.querySelector(".work-hours")),
                  minutes: valueOrEmpty(row.querySelector(".work-minutes")),
                  time: valueOrEmpty(row.querySelector(".work-hours-text")),
                };
              }
              if (keyName === "notes[]") {
                return { text: keyVal };
              }
              return {
                used: keyVal,
                number: valueOrEmpty(
                  row.querySelector('input[name="parts_number[]"]')
                ),
                quantity: valueOrEmpty(
                  row.querySelector('input[name="parts_qty[]"]')
                ),
              };
            })
            .filter(Boolean);
        };

        const data = {
          file_name: currentFileName,
          saved_at: new Date().toISOString(),
          vehicle: {
            reg_no: valueOrEmpty(regNoMainEl || regNoEl),
            make: valueOrEmpty(makeEl),
            model: valueOrEmpty(modelEl),
          },
          date_in: valueOrEmpty(dateInEl),
          kilometrage: valueOrEmpty(mileageKmEl),
          mileage: valueOrEmpty(mileageMiEl),
          vin: valueOrEmpty(vinEl),
          pin_code: valueOrEmpty(pinCodeEl),
          work: readRows(workBody, "work_description[]"),
          parts: readRows(partsBody, "parts_used[]"),
          notes: readRows(notesBody, "notes[]"),
        };

        try {
          const res = await fetch("/api/save", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(data),
          });
          if (!res.ok) {
            throw new Error(await res.text());
          }
          const saved = await res.json();
          currentFileName = saved.file_name || currentFileName;
          await renderHistory(regNoMainEl?.value || "");
          await renderUsedPartsNumbers(regNoMainEl?.value || "");
          if (saveBtn) {
            saveBtn.style.display = "none";
            setTimeout(() => {
              saveBtn.style.display = "";
            }, 2000);
          }
        } catch (err) {
          setError(String(err));
        } finally {
          saveBtn.disabled = false;
        }
      });
    }

    async function loadFromServer(fileName, autoPrint) {
      try {
        const res = await fetch(`/api/load?file=${encodeURIComponent(fileName)}`);
        if (!res.ok) {
          throw new Error(await res.text());
        }
        const data = await res.json();
        await applyLoadedData(data);
        currentFileName = fileName;
        if (autoPrint) {
          updateAllWorkText();
          updateRowPrintVisibility(workBody);
          updateRowPrintVisibility(partsBody);
          updateRowPrintVisibility(notesBody);
          window.print();
        }
      } catch (err) {
        setError(String(err));
      }
    }

    async function applyLoadedData(data) {
      const vehicle = data?.vehicle || {};
      if (regNoMainEl) regNoMainEl.value = vehicle.reg_no || "";
      if (regNoMainPrintEl) regNoMainPrintEl.value = vehicle.reg_no || "";
      if (makeEl) makeEl.value = vehicle.make || "";
      if (modelEl) modelEl.value = vehicle.model || "";
      if (dateInEl) dateInEl.value = data?.date_in || "";
      if (mileageKmEl) mileageKmEl.value = data?.kilometrage || "";
      if (mileageMiEl) mileageMiEl.value = data?.mileage || "";
      if (vinEl) vinEl.value = data?.vin || "";
      if (pinCodeEl) pinCodeEl.value = data?.pin_code || "";
      updateMileagePrint();
      updateMileageValidity();
      updateFieldPrintVisibility();
      await renderHistory(vehicle.reg_no || "");
      await renderUsedPartsNumbers(vehicle.reg_no || "");
      renderGoogleSearch(null, vehicle.reg_no || "", vehicle);

      workBody.innerHTML = "";
      const workRows = Array.isArray(data?.work) ? data.work : [];
      workRows.forEach((item) => {
        const row = createWorkRow();
        const descEl = row.querySelector('input[name="work_description[]"]');
        if (descEl) descEl.value = item.description || "";
        const hoursEl = row.querySelector(".work-hours");
        const minutesEl = row.querySelector(".work-minutes");
        const textEl = row.querySelector(".work-hours-text");
        if (hoursEl && item.hours !== undefined) hoursEl.value = item.hours;
        if (minutesEl && item.minutes !== undefined) minutesEl.value = item.minutes;
        if ((!item.hours && !item.minutes) && item.time && textEl) {
          const parts = String(item.time).split(":");
          if (parts.length === 2) {
            if (hoursEl) hoursEl.value = parts[0];
            if (minutesEl) minutesEl.value = parts[1];
          }
        }
        updateWorkText(row);
        workBody.appendChild(row);
      });
      workBody.appendChild(createWorkRow());

      updateAllWorkText();

      partsBody.innerHTML = "";
      const partsRows = Array.isArray(data?.parts) ? data.parts : [];
      partsRows.forEach((item) => {
        partsBody.appendChild(
          createPartRow(item.used || "", item.number || "", item.quantity || "")
        );
      });
      partsBody.appendChild(createPartRow());

      notesBody.innerHTML = "";
      const notesRows = Array.isArray(data?.notes) ? data.notes : [];
      notesRows.forEach((item) => {
        notesBody.appendChild(
          createNotesRow(item.text || "")
        );
      });
      notesBody.appendChild(createNotesRow());

      updateRemoveButtons(workBody);
      updateRemoveButtons(partsBody);
      updateRemoveButtons(notesBody);
      updateRowNumbers(workBody);
      updateRowNumbers(partsBody);
      updateRowNumbers(notesBody);
      updateRowPrintVisibility(workBody);
      updateRowPrintVisibility(partsBody);
      updateRowPrintVisibility(notesBody);

      regNoOnlyEl.style.display = "none";
      mainContentEl.style.display = "flex";
    }

    const urlParams = new URLSearchParams(window.location.search);
    const loadFile = urlParams.get("file");
    const autoPrint = urlParams.get("print") === "1";
    if (loadFile) {
      loadFromServer(loadFile, autoPrint);
    }

    updateClock();
    setInterval(updateClock, 1000);

  </script>
</body>

</html>
