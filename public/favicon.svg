<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 2x2 grid in the four main colours of the Cleere Auto Services logo:
       royal blue (letters), silver (gear), white (background), black
       (deep shadow). Checkerboard arrangement so no two adjacent
       squares share a value — reads cleanly at 16 px in a browser tab. -->
  <rect x="0"  y="0"  width="16" height="16" fill="#1a56b8"/>
  <rect x="16" y="0"  width="16" height="16" fill="#ffffff"/>
  <rect x="0"  y="16" width="16" height="16" fill="#b0b0b0"/>
  <rect x="16" y="16" width="16" height="16" fill="#000000"/>
</svg>
