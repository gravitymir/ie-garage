<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jobs - Cleere Auto Services</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;900&display=swap" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "JetBrains Mono", monospace;
      margin: 0;
      padding: 20px;
      color: #111;
      background: #f5f5f5;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .topbar h1 { margin: 0; font-size: 1.4rem; }
    a.home { text-decoration: none; color: #3275ac; font-weight: 600; }
    .toolbar {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    input[type="search"] {
      font-family: inherit; padding: 8px 10px; border: 1px solid #bbb;
      border-radius: 4px; font-size: 14px; flex: 1; min-width: 200px;
    }
    /* Main page search — doubled font size */
    #search {
      font-size: 28px;
      padding: 10px 14px;
    }
    .muted { color: #666; font-size: 13px; margin: 8px 0; }
    .table-wrap {
      background: #fff; border: 1px solid #ccc; border-radius: 6px;
      overflow: auto; max-height: 80vh;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td {
      border-bottom: 1px solid #eee; padding: 8px 10px; text-align: left;
    }
    th {
      background: #f0f0f0; position: sticky; top: 0; z-index: 1;
      font-weight: 600; color: #333;
    }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #eef5fa; }
    .plate { color: #3275ac; font-weight: 900; }
    /* Compact width for the "Last activity" cell — fits "DD.MM.YYYY HH:MM"
       (16 chars) plus a status mark and a space. */
    .col-last { width: 20ch; white-space: nowrap; }
    .col-plate { width: 10ch; }
    .vehicle-cell .mk { color: #555; font-size: 0.85em; margin-right: 4px; }
    /* Status marks on the left of the "Last activity" cell — sized 2× so
       they're readable at a glance across the whole list. line-height 1 +
       vertical-align middle keeps the row height from ballooning. */
    .st-fin, .st-pau, .st-op, .st-wd {
      font-size: 2em; font-weight: 900;
      display: inline-block; vertical-align: middle;
      line-height: 1; margin-right: 4px;
    }
    .st-fin { color: #2a7;    }   /* Closed / legacy Finished — green check */
    .st-wd  { color: #b58c00; }   /* Work done — yellow check (mechanic done, not delivered) */
    .st-pau { color: #c80;    }   /* Paused — orange */
    .st-op  { color: #3275ac; }   /* Open — blue dot */
    .vehicle-cell { font-size: 12px; }
    .vehicle-cell .mk    { color: #555; }
    .vehicle-cell .md    { color: #111; font-weight: 600; margin-left: 4px; }
    .vehicle-cell .sep   { color: #aaa; margin: 0 6px; }
    .vehicle-cell .eng   { color: #444; }
    .vehicle-cell .disp  { color: #3275ac; font-weight: 700; }
    .vehicle-cell .fuel-badge {
      display: inline-block;
      padding: 1px 6px;
      margin-left: 8px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.05em;
      border-radius: 3px;
      border: 1px solid;
      vertical-align: middle;
    }

    /* Floating hover-preview — one shared element for the whole page. Sits
       above everything (z-index) and never blocks clicks (pointer-events:
       none), so the mechanic can still click the row it's covering.
       The image lazy-loads on first mouseenter — nothing is fetched at
       page load. Browser cache handles subsequent hovers instantly. */
    #hover-preview {
      position: fixed;
      display: none;
      width: 320px;
      max-width: 40vw;
      border-radius: 8px;
      border: 1px solid #888;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
      overflow: hidden;
      pointer-events: none;
      z-index: 9500;
    }
    #hover-preview.on { display: block; }
    #hover-preview img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      background: #f5f5f5;
    }
    #hover-preview .cap {
      padding: 6px 10px 8px;
      text-align: center;
      font-size: 1.05rem; font-weight: 900;
      color: #3275ac;
      letter-spacing: 0.03em;
      border-top: 1px solid #eee;
    }
  </style>
  <script src="/overlay.js"></script>  <script src="/auth.js"></script>  <script src="/fuel-detect.js"></script>  <script src="/chat.js"></script>
</head>

<body>
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:12px;">
      <a class="home" href="/index.html" style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid #3275ac; border-radius:4px; color:#3275ac; text-decoration:none; font-weight:600;">&larr; Home</a>
      <h1>Jobs</h1>
    </div>
  </div>

  <div class="toolbar">
    <input type="search" id="search" placeholder="Search by plate, customer, make, model..." />
  </div>

  <div class="muted" id="status">Loading...</div>

  <!-- Single shared hover-preview element for the whole rows list. Filled
       on mouseenter of each row; hidden on mouseleave. -->
  <div id="hover-preview" aria-hidden="true">
    <img id="hover-preview-img" alt="" />
    <div class="cap" id="hover-preview-cap"></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-last">Last activity</th>
          <th class="col-plate">Plate</th>
          <th>Vehicle</th>
          <th>Worker</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <script>
    const rows = document.getElementById("rows");
    const statusEl = document.getElementById("status");
    const searchEl = document.getElementById("search");
    let items = [];

    function fmt(ms) {
      if (!ms) return "";
      const d = new Date(ms);
      const p = n => String(n).padStart(2, "0");
      return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    function statusBadge(s) {
      // Legacy "finished" from before the Work done / Close split is treated
      // as "closed". work_done gets its own yellow ✓ so QC can spot jobs
      // waiting for delivery.
      switch (String(s || "").toLowerCase()) {
        case "closed":
        case "finished": return `<span class="st-fin" title="Closed">✓✓</span>`;
        case "work_done":return `<span class="st-wd"  title="Work done — awaiting delivery">✓</span>`;
        case "paused":   return `<span class="st-pau" title="Paused">⏸</span>`;
        case "open":     return `<span class="st-op"  title="Open">●</span>`;
        default:         return "";
      }
    }

    function render() {
      const q = (searchEl.value || "").toLowerCase().trim();
      const filtered = items.filter(it => {
        if (!q) return true;
        return [it.plate, it.make, it.model, it.worker_name, it.status]
          .some(v => String(v || "").toLowerCase().includes(q));
      });
      rows.innerHTML = "";
      if (!filtered.length) {
        statusEl.textContent = items.length ? "No matches." : "No jobs yet.";
        return;
      }
      statusEl.textContent = `${filtered.length} job${filtered.length===1?"":"s"}`;
      // Defensive sort on the client too (the API already sorts by last_active_ms desc).
      filtered.sort((a, b) =>
        (b.last_active_ms || b.saved_ms || 0) - (a.last_active_ms || a.saved_ms || 0)
      );
      filtered.forEach(it => {
        const tr = document.createElement("tr");
        // Feed data to the shared hover-preview handler below. Only stamp
        // has-photo when the backend told us the car actually has one, so
        // we don't fire pointless 404 image requests on hover.
        if (it.has_photo) {
          tr.dataset.plate = it.plate || "";
          tr.dataset.photoV = String(it.photo_updated_ms || 0);
          const label = [it.plate, it.make, it.model].filter(s => (s || "").trim()).join(" · ");
          tr.dataset.previewLabel = label;
        }
        const lastMs = it.last_active_ms || it.saved_ms || 0;
        const make = (it.make || "").trim();
        const model = (it.model || "").trim();
        const eng = (it.engine_summary || "").trim();
        const disp = (it.displacement || "").trim();
        const fuel = (it.fuel_type || "").trim().toLowerCase();
        // Build the vehicle strip piece by piece — each piece may be empty
        // for older / manually-added cars, so we collect non-empty ones and
        // join them with "·" separators.
        const pieces = [];
        if (make || model) {
          pieces.push(
            (make ? `<span class="mk">${esc(make)}</span>` : "") +
            (model ? `<span class="md">${esc(model)}</span>` : "")
          );
        }
        if (eng)  pieces.push(`<span class="eng">${esc(eng)}</span>`);
        if (disp) pieces.push(`<span class="disp">${esc(disp)} L</span>`);
        let vehicleHtml = pieces.join(`<span class="sep">·</span>`);
        // Trailing fuel badge.
        if (fuel && typeof window.fuelTypeMeta === "function") {
          const meta = window.fuelTypeMeta(fuel);
          vehicleHtml += ` <span class="fuel-badge" style="color:${meta.color};background:${meta.bg};border-color:${meta.color};">${esc(meta.label)}</span>`;
        }
        tr.innerHTML = `
          <td class="col-last">${statusBadge(it.status)} ${fmt(lastMs)}</td>
          <td class="plate col-plate">${it.plate || ""}</td>
          <td class="vehicle-cell">${vehicleHtml}</td>
          <td>${it.worker_name || ""}</td>
        `;
        tr.addEventListener("click", () => {
          window.location.href = `/job.html?plate=${encodeURIComponent(it.plate)}&file=${encodeURIComponent(it.name)}`;
        });
        rows.appendChild(tr);
      });

      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s == null ? "" : String(s);
        return d.innerHTML;
      }
    }

    searchEl.addEventListener("input", () => {
      const pos = searchEl.selectionStart;
      searchEl.value = searchEl.value.toUpperCase();
      try { searchEl.setSelectionRange(pos, pos); } catch (_) {}
      render();
    });

    // ---------- Hover preview ----------
    // One shared floating panel that follows the cursor. Lazy: the <img> src
    // is only set the moment the cursor enters a row that has a photo.
    // Delegation on tbody keeps a single set of listeners no matter how
    // many rows are rendered.
    (function initHoverPreview() {
      const preview = document.getElementById("hover-preview");
      const previewImg = document.getElementById("hover-preview-img");
      const previewCap = document.getElementById("hover-preview-cap");
      const tbody = document.getElementById("rows");
      if (!preview || !tbody) return;

      // Track the plate we're currently previewing so we don't reset src on
      // every mousemove inside the same row (which would restart loading).
      let currentPlate = "";

      // Position the panel to the RIGHT of and slightly ABOVE the cursor.
      // Clamps to viewport so it never leaves the visible area.
      function place(x, y) {
        const w = preview.offsetWidth  || 320;
        const h = preview.offsetHeight || 220;
        let left = x + 20;
        let top  = y - 40;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        if (left + w + 8 > vw) left = x - w - 20; // flip to the LEFT of the cursor
        if (left < 8) left = 8;
        if (top + h + 8 > vh) top = vh - h - 8;
        if (top < 8) top = 8;
        preview.style.left = left + "px";
        preview.style.top  = top  + "px";
      }

      tbody.addEventListener("mouseover", (e) => {
        const tr = e.target && e.target.closest ? e.target.closest("tr") : null;
        if (!tr || !tr.dataset.plate) { hide(); return; }
        const plate = tr.dataset.plate;
        if (plate === currentPlate) return; // still on the same row
        currentPlate = plate;
        const v = tr.dataset.photoV || "0";
        // Thumb URL — smaller file than full photo. Lazy: browser only starts
        // downloading the image on this src assignment.
        previewImg.src = `/api/cars/${encodeURIComponent(plate)}/photo/thumb?v=${v}`;
        previewCap.textContent = tr.dataset.previewLabel || plate;
        preview.classList.add("on");
        place(e.clientX, e.clientY);
      });

      tbody.addEventListener("mousemove", (e) => {
        if (preview.classList.contains("on")) place(e.clientX, e.clientY);
      });

      function hide() {
        preview.classList.remove("on");
        currentPlate = "";
        // Drop the src so leaving a row doesn't keep a stale image loaded
        // in the DOM (helps memory when scrolling through hundreds of rows).
        previewImg.removeAttribute("src");
      }
      tbody.addEventListener("mouseleave", hide);
      // If the image 404s (car folder without photo — shouldn't happen since
      // has_photo gates this, but just in case), hide the preview instead of
      // showing a broken-image icon.
      previewImg.addEventListener("error", hide);
    })();

    async function load() {
      try {
        const res = await fetch("/api/jobs");
        const data = await res.json();
        items = data.items || [];
        render();
      } catch (e) {
        statusEl.textContent = "Error: " + e;
      }
    }
    load();
  </script>
</body>

</html>
