<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Car - Cleere Auto Services</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;900&display=swap" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "JetBrains Mono", monospace;
      margin: 0;
      padding: 20px;
      color: #111;
      background: #f5f5f5;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .topbar h1 { margin: 0; font-size: 1.4rem; }
    .plate {
      color: #3275ac; font-weight: 900; letter-spacing: 0.04em;
    }
    .fuel-badge {
      display: none;
      padding: 6px 14px;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      border-radius: 6px;
      border: 1px solid;
    }
    .fuel-badge.visible { display: inline-block; }
    /* Gearbox badge — sits right of the fuel badge in the header. Muted
       neutral colour so it doesn't compete visually with the fuel chip
       (fuel is the "hot" attribute — determines oil grade — gearbox is
       secondary info). */
    .gearbox-badge {
      display: none;
      padding: 6px 14px;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      border-radius: 6px;
      border: 1px solid #888;
      color: #444;
      background: #f0f0f0;
      text-transform: uppercase;
    }
    .gearbox-badge.visible { display: inline-block; }
    a.home, a.subpage {
      text-decoration: none; color: #3275ac; font-weight: 600;
    }
    button {
      font-family: inherit; padding: 8px 14px;
      border: 1px solid #3275ac; background: #3275ac; color: #fff;
      border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    button.secondary { background: #fff; color: #3275ac; }
    button.danger { background: #c33; border-color: #c33; }
    button:hover { opacity: 0.9; }

    .layout {
      display: grid;
      /* Left column holds Photo, VIN, Engine and oil capacity — engine
         line "2.0 L, T7CE>CN, Duratorq, 150HP, 110KW, 3500RPM, 7.2 L"
         is the longest thing on the page, so the column tops out at
         600px to keep it on one line at typical desktop widths. */
      grid-template-columns: minmax(360px, 600px) 1fr;
      gap: 16px;
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }
    .card {
      background: #fff; border: 1px solid #ccc; border-radius: 8px;
      padding: 14px;
    }
    .card h2 { margin: 0 0 10px; font-size: 1rem; color: #555; }
    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    .field label { font-size: 12px; color: #555; }
    input[type="text"], input[type="tel"], input[type="number"], textarea, select {
      font-family: inherit; padding: 6px 8px; border: 1px solid #bbb;
      border-radius: 4px; font-size: 14px; width: 100%;
    }
    select { height: 32px; background-color: #fff; }
    textarea { min-height: 60px; resize: vertical; }
    input[readonly] { background: #f0f0f0; color: #555; cursor: default; }
    /* Highlight the VIN field when its contents can't be a legal VIN
       (wrong chars, wrong length). Save button is also blocked while
       this is on — see checkDirty(). */
    input.invalid {
      background: #fdecec !important;
      border-color: #c33 !important;
    }
    button.btn-disabled { opacity: 0.45; cursor: not-allowed; }
    button.btn-disabled:hover { opacity: 0.45; }
    .row-btns { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }

    .list { display: flex; flex-direction: column; gap: 6px; }
    .item {
      background: #fafafa; border: 1px solid #ddd; border-radius: 6px;
      padding: 8px 10px; display: flex; justify-content: space-between;
      align-items: center; gap: 8px; font-size: 13px;
    }
    .item .name {
      flex: 1; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .item a { color: #3275ac; text-decoration: none; }
    .item a:hover { text-decoration: underline; }
    .item button { padding: 4px 8px; font-size: 12px; }
    /* Status glyph rendered as its OWN block, left of the date/description
       column, so both text lines line up cleanly to the right of the badge
       (instead of the description wrapping under it). Colours mirror the
       global jobs list on /jobs.html so a mechanic sees the same code
       everywhere: ● Open (blue) · ⏸ Paused (orange) · ✓✓ Work done (green,
       terminal). Legacy Closed / Finished render as the same double green
       so historical rows keep the same icon. */
    .item .st {
      flex: 0 0 auto;
      font-weight: 900; font-size: 1.9em; line-height: 1;
      min-width: 48px; text-align: center;
      align-self: center;
    }
    .item .st-op  { color: #3275ac; }
    .item .st-pau { color: #c80;    }
    .item .st-wd  { color: #2a7;    }
    .item .st-fin { color: #2a7;    }
    /* Sequential job number — extracted from the file name
       (e.g. "11LK3781_3.json" → 3). Big plain digit, no chip or hash,
       aligned into its own column so 1-digit and 2-digit numbers
       don't push the description around. */
    .item .jobno {
      flex: 0 0 auto;
      font-family: inherit; font-weight: 700; font-size: 1.7rem;
      color: #555;
      align-self: center;
      min-width: 2ch; text-align: center;
    }
    /* Mileage at the time this job was worked — same digit style as
       the job number but a touch smaller, so the eye reads:
       [status] [job #] [km when serviced] [date · summary]. */
    .item .odo {
      flex: 0 0 auto;
      font-family: inherit; font-weight: 700; font-size: 1.2rem;
      color: #555;
      align-self: center;
      text-align: right;
    }
    .item .odo .odo-unit { font-size: 0.75rem; color: #888; font-weight: 600; margin-left: 2px; }

    .muted { color: #666; font-size: 12px; }
    .status { font-size: 13px; color: #555; margin: 6px 0; }
    .status.err { color: #c33; }
    .status.ok { color: #393; }

    .photo-wrap {
      margin-bottom: 10px;
      background: #fafafa;
      border: 1px dashed #ccc;
      border-radius: 6px;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .photo-wrap img {
      max-width: 100%;
      max-height: 260px;
      display: block;
      border-radius: 4px;
      cursor: zoom-in;
    }
    .photo-wrap .empty {
      color: #888;
      font-size: 13px;
      padding: 20px;
      cursor: pointer;
      text-align: center;
      width: 100%;
      transition: color 0.15s, background 0.15s;
    }
    .photo-wrap .empty:hover { color: #3275ac; background: #f0f6fb; }

    /* Full-screen photo lightbox */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 9000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox-actions {
      position: absolute; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 1;
      flex-wrap: wrap; justify-content: center;
    }
    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .lightbox img { cursor: zoom-out; }

    .oil-item { flex-direction: column; align-items: stretch; }
    .oil-item .head { display: flex; justify-content: space-between; align-items: center; }
    .oil-item .body { font-size: 12px; color: #444; margin-top: 6px; display: none; }
    .oil-item.open .body { display: block; }
    .oil-item pre { background: #fff; border: 1px solid #eee; padding: 6px; max-height: 240px; overflow: auto; font-size: 11px; }
  </style>
  <script src="/overlay.js"></script>  <script src="/auth.js"></script>  <script src="/fuel-detect.js"></script>  <script src="/chat.js"></script>  <script src="/save-feedback.js"></script>
</head>

<body>
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <a href="/index.html" style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid #3275ac; border-radius:4px; color:#3275ac; text-decoration:none; font-weight:600;">&larr; Home</a>
      <a href="/cars.html" style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid #3275ac; border-radius:4px; color:#3275ac; text-decoration:none; font-weight:600;">&larr; All Cars</a>
      <h1>Car: <span class="plate" id="title-plate"></span></h1>
      <span id="fuel-badge" class="fuel-badge"></span>
      <span id="gearbox-badge" class="gearbox-badge" title="Gearbox"></span>
    </div>
  </div>

  <div class="layout">

    <!-- Left: car info + photo -->
    <div style="display:flex; flex-direction:column; gap:16px;">

    <div class="card">
      <div class="photo-wrap" id="photo-wrap">
        <div class="empty" id="no-photo" title="Click to upload a photo">No photo yet — click to upload.</div>
        <img id="car-photo" alt="Car photo" style="display:none;" />
      </div>
      <input type="file" id="photo-input" accept="image/*" style="display:none;" />
      <div class="status" id="photo-status"></div>
    </div>

    <!-- Full-screen photo viewer -->
    <div class="lightbox" id="lightbox">
      <img id="lightbox-img" alt="Car photo" />
      <div class="lightbox-actions">
        <button class="secondary" id="lb-change">Upload / Change</button>
        <button class="danger" id="lb-delete">Delete photo</button>
      </div>
    </div>

    <div class="card">
      <h2>Vehicle Info</h2>
      <div class="field">
        <label>Reg No</label>
        <input type="text" id="reg_no" readonly />
      </div>
      <div class="field">
        <label>Make</label>
        <!-- Editable so JDM / grey imports and other MPMoil-unknown cars can
             have their marque typed in by hand. Auto-populated from MPMoil
             when the API knows the plate. -->
        <input type="text" id="make" />
      </div>
      <div class="field">
        <label>Model</label>
        <input type="text" id="model" />
      </div>
      <div class="field">
        <label>Years</label>
        <input type="text" id="years" placeholder="e.g. 2017 or 2014-2019" />
      </div>
      <div class="field">
        <label>Engine, oil cap</label>
        <input type="text" id="engine" placeholder="e.g. P3-VPS 1.3 SKYACTIV-G · 92HP · 3.8 L" />
      </div>
      <!-- Manual overrides for the job page's big oil card. Filled from
           MPMoil when it knows the car; typed in by hand otherwise. The
           values here take precedence over anything the MPMoil archive
           returns, so a hand-typed value always wins. -->
      <div class="field">
        <label>Oil capacity (L)</label>
        <input type="number" id="oil_capacity" min="0" step="0.1"
               placeholder="e.g. 3.8" />
      </div>
      <div class="field">
        <label>Oil viscosity</label>
        <input type="text" id="oil_viscosity" placeholder="e.g. 0W-20" />
      </div>
      <div class="field">
        <label>Fuel type</label>
        <select id="fuel_type">
          <option value="unknown">Unknown</option>
          <option value="petrol">Petrol</option>
          <option value="diesel">Diesel</option>
          <option value="petrol-electric">Petrol/Electric</option>
          <option value="diesel-electric">Diesel/Electric</option>
          <option value="electric">Electric</option>
        </select>
      </div>
      <div class="field">
        <label>Gearbox</label>
        <select id="gearbox">
          <option value="unknown">Unknown</option>
          <option value="manual">Manual</option>
          <option value="automatic">Automatic</option>
          <option value="semi-automatic">Semi-automatic</option>
          <option value="cvt">CVT</option>
          <option value="e-cvt">e-CVT</option>
        </select>
      </div>
      <div class="field">
        <label>VIN</label>
        <input type="text" id="vin" maxlength="17" placeholder="17 chars (no I, O, Q)" />
      </div>
      <div class="field">
        <label>PIN</label>
        <input type="text" id="pin" maxlength="7" inputmode="numeric" placeholder="4–7 digit code" />
      </div>
      <div class="field">
        <label>Customer name</label>
        <input type="text" id="customer_name" />
      </div>
      <div class="field">
        <label>Customer phone</label>
        <input type="tel" id="customer_phone" />
      </div>
      <div class="row-btns">
        <button id="save-car" style="display:none;">Save</button>
        <button class="danger" id="delete-car">Delete car</button>
      </div>
      <div class="status" id="car-status"></div>
    </div>

    </div>

    <!-- Right: jobs + oil -->
    <div style="display:flex; flex-direction:column; gap:16px;">
      <div class="card">
        <h2>Jobs <span class="muted" id="jobs-count"></span></h2>
        <div class="row-btns" style="margin-bottom:10px;">
          <button id="new-job">+ New Job</button>
        </div>
        <div class="list" id="jobs-list"></div>
      </div>

      <!-- Free-form notes about the car — moved out of the left Vehicle Info
           card so it can breathe. Sits between Jobs and Oil archive so it's
           visible when reviewing history but doesn't crowd the fixed
           vehicle fields on the left. Textarea id / EDITABLE hookup /
           save-payload are untouched — only the DOM position moved. -->
      <div class="card">
        <h2>Notes</h2>
        <textarea id="notes" style="width:100%; min-height:100px; resize:vertical;"></textarea>
      </div>

      <div class="card">
        <h2>Oil archive <span class="muted" id="oil-count"></span></h2>
        <div class="muted" style="margin-bottom:6px;">Fluids by component — tap to expand</div>
        <div class="list" id="fluids-list"></div>
        <div class="muted" style="margin:12px 0 4px;">Raw records</div>
        <div class="status" id="oil-status"></div>
        <div class="list" id="oil-list"></div>
      </div>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const plate = (params.get("plate") || "").toUpperCase();
    document.getElementById("title-plate").textContent = plate || "(unknown)";

    const carStatus = document.getElementById("car-status");
    const oilStatus = document.getElementById("oil-status");

    // Build a useful error from a failed fetch Response, even when the body is empty.
    async function errFromRes(res) {
      let body = "";
      try { body = (await res.text()).trim(); } catch (_) {}
      if (body) return body;
      return `HTTP ${res.status} ${res.statusText || ""}`.trim();
    }

    function toStr(v) {
      if (v == null) return "";
      if (typeof v === "string") return v;
      if (typeof v === "number" || typeof v === "boolean") return String(v);
      if (typeof v === "object") {
        // mpmoil returns objects like { id, name, slug, ... } — pull the human-readable field
        return v.name || v.title || v.label || v.brand || v.model || v.text || "";
      }
      return String(v);
    }

    // Production years "2008 - 2012" from the saved mpmoil variant.
    function yearsFromVariant(v) {
      v = v || {};
      const fromRaw = v.year_from ?? v.from_year ?? v.year_start ?? null;
      const toRaw = v.year_until ?? v.year_to ?? v.year_end ?? null;
      const from = (fromRaw && Number(fromRaw)) ? fromRaw : null;
      const to = (toRaw && Number(toRaw)) ? toRaw : null;
      if (from && to && String(from) !== String(to)) return `${from} - ${to}`;
      if (from) return String(from);
      if (to) return String(to);
      return "";
    }

    // Pull engine name/code and oil litres out of an mpmoil advice HTML blob.
    function extractEngineName(html) {
      if (!html) return null;
      const m = html.match(/<h3>\s*([^<]*?engine[^<]*?)\s*<\/h3>/i);
      if (m) return m[1].trim();
      const m2 = html.match(/<h3>\s*([^<]*?)\s*<\/h3>/i);
      return m2 ? m2[1].trim() : null;
    }
    function extractEngineOilLitres(html) {
      if (!html) return null;
      const rx = /<h3>[^<]*engine[^<]*<\/h3>[\s\S]*?class="amount">\s*([0-9]+(?:[.,][0-9]+)?)(?:\s*[-–]\s*([0-9]+(?:[.,][0-9]+)?))?\s*(?:liter|litre|l\b)/i;
      const rxAny = /class="amount">\s*([0-9]+(?:[.,][0-9]+)?)(?:\s*[-–]\s*([0-9]+(?:[.,][0-9]+)?))?\s*(?:liter|litre|l\b)/i;
      const m = html.match(rx) || html.match(rxAny);
      if (!m) return null;
      // Lower bound only — the Engine field on the car card is a scalar
      // display ("DBGA · 150HP · 4.7 L") to match every other downstream
      // consumer. The range form ("4.7–5.5 L") is intentionally kept
      // only inside the Add Car variant chooser.
      return m[1].replace(",", ".");
    }

    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // "motor-oil-5w-30-premium-synthetic-dpf" -> "Motor Oil 5W-30 Premium Synthetic DPF"
    function humanizeSlug(slug) {
      return slug.split("-").map(w =>
        /\d/.test(w) ? w.toUpperCase() : (w.charAt(0).toUpperCase() + w.slice(1))
      ).join(" ");
    }

    // Parse step-b advice DOM into per-component fluid recommendations.
    function parseFluids(doc) {
      if (!doc) return [];
      return [...doc.querySelectorAll(".advice-part")].map(part => {
        const name = (part.querySelector("h3")?.textContent || "").replace(/\s+/g, " ").trim();
        const amount = (part.querySelector(".advice-amount .amount")?.textContent || "").replace(/\s+/g, " ").trim();
        const usage = (part.querySelector(".advice-usage")?.textContent || "").replace(/\s+/g, " ").replace(/^Usage:\s*/i, "").trim();
        const seen = new Set();
        const products = [];
        part.querySelectorAll('a[href^="/products/"]').forEach(a => {
          const m = (a.getAttribute("href") || "").match(/^\/products\/([^\/]+)\/([^\/?#]+)/);
          if (!m) return;
          const code = m[1], slug = m[2];
          if (code.toLowerCase() === "recommendation") return; // skip share link
          const key = code + "|" + slug;
          if (seen.has(key)) return;
          seen.add(key);
          products.push({ code, name: humanizeSlug(slug) });
        });
        return { name, amount, usage, products };
      }).filter(c => c.name);
    }

    function renderFluids(components) {
      const list = document.getElementById("fluids-list");
      if (!list) return;
      list.innerHTML = "";
      if (!components.length) {
        list.innerHTML = `<div class="muted">No recommendation data.</div>`;
        return;
      }
      components.forEach(c => {
        const div = document.createElement("div");
        div.className = "item oil-item";
        const summary = c.amount
          ? `${esc(c.name)} <span class="muted">· ${esc(c.amount)}</span>`
          : esc(c.name);
        let body = "";
        if (c.amount) body += `<div><strong>Amount:</strong> ${esc(c.amount)}</div>`;
        if (c.usage) body += `<div><strong>Usage:</strong> ${esc(c.usage)}</div>`;
        if (c.products.length) {
          body += `<div style="margin-top:4px;"><strong>Recommended:</strong>`
            + `<ul style="margin:4px 0 0; padding-left:18px;">`
            + c.products.map(p => `<li>${esc(p.name)} <span class="muted">(${esc(p.code)})</span></li>`).join("")
            + `</ul></div>`;
        }
        div.innerHTML = `
          <div class="head" style="cursor:pointer;">
            <div class="name">${summary}</div>
          </div>
          <div class="body">${body || '<span class="muted">No details.</span>'}</div>
        `;
        div.querySelector(".head").addEventListener("click", () => div.classList.toggle("open"));
        list.appendChild(div);
      });
    }

    // Read the chosen variant's oil record once: fill the Engine field + the fluids list.
    async function loadVariantOilDetails() {
      const engEl = document.getElementById("engine");
      try {
        const res = await fetch(`/api/cars/${encodeURIComponent(plate)}/oil`);
        const data = await res.json();
        const items = (data.items || []).filter(o =>
          !/^_?step-?a/i.test(o.name || "") && !/^step a/i.test(o.title || ""));
        if (!items.length) { renderFluids([]); return; }
        const r = await fetch(`/api/cars/${encodeURIComponent(plate)}/oil/${encodeURIComponent(items[0].name)}`);
        const rec = await r.json();
        const html = (rec && rec.data && (rec.data.html || (rec.data.data && rec.data.data.html))) || rec.html || "";
        const doc = new DOMParser().parseFromString(html, "text/html");
        // Engine field: engine code · power (HP/KW/RPM) · oil litres
        const eng = extractEngineName(html);
        const lit = extractEngineOilLitres(html);
        let power = "";
        doc.querySelectorAll(".model").forEach(el => {
          const t = el.textContent.replace(/\s+/g, " ").trim();
          if (!power && /\d\s*HP/i.test(t)) power = t; // e.g. "136HP, 100KW, 4200RPM"
        });
        const engName = eng ? (eng.replace(/^engine\s+/i, "") || eng) : "";
        // Engine displacement ("1.2", "2.0" …) — cached on car.json by
        // the backend, extracted from the mpmoil variant name. First
        // token in the Engine field so a passing glance tells the
        // mechanic the engine size before the CJZA/B47/etc code.
        const disp = String((carData && carData.displacement) || "").trim();
        const dispPart = disp ? `${disp} L` : "";
        // Only fill the Engine field from MPMoil when the user hasn't typed
        // their own value — otherwise a hand-typed "P3-VPS 1.3 SKYACTIV-G"
        // would silently get replaced with whatever MPMoil returns.
        if (!engEl.value.trim()) {
          engEl.value = [dispPart, engName, power, (lit ? `${lit} L` : "")].filter(Boolean).join(", ");
        }
        renderFluids(parseFluids(doc));
      } catch (_) { renderFluids([]); }
    }

    // --- Vehicle Info: show Save only when an editable field changed ---
    const EDITABLE = [
      "customer_name", "customer_phone", "notes", "vin", "pin", "fuel_type", "gearbox",
      // Editable so JDM imports and other MPMoil-unknown cars can be filled
      // in by hand. When MPMoil knows the plate these are auto-populated on
      // create; the user is free to override them afterwards.
      "make", "model", "years", "engine",
      "oil_capacity", "oil_viscosity",
    ];
    let baseline = {};
    let carData = {}; // full car.json, so Save preserves mpmoil/photo fields

    // VIN rules per ISO 3779: exactly 17 chars, uppercase A-Z / 0-9,
    // with I, O and Q excluded so they can't be misread as 1, 0 or 0/9.
    // An empty VIN is fine (field is optional) — only a non-empty
    // malformed value counts as invalid.
    const VIN_RE = /^[A-HJ-NPR-Z0-9]{17}$/;
    function isVinValid(raw) {
      const v = (raw || "").trim().toUpperCase();
      return v === "" || VIN_RE.test(v);
    }
    function refreshVinValidity() {
      const el = document.getElementById("vin");
      const ok = isVinValid(el.value);
      el.classList.toggle("invalid", !ok);
      return ok;
    }

    function checkDirty() {
      const dirty = EDITABLE.some(id => document.getElementById(id).value !== baseline[id]);
      // Save is blocked whenever the VIN can't parse — otherwise a bad
      // 17-char blob (with I/O/Q or 15 chars) would ride into car.json.
      const vinOk = refreshVinValidity();
      document.getElementById("save-car").style.display = (dirty && vinOk) ? "" : "none";
    }
    function snapshotBaseline() {
      baseline = {};
      EDITABLE.forEach(id => { baseline[id] = document.getElementById(id).value; });
      checkDirty();
    }
    EDITABLE.forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener("input", checkDirty);
      el.addEventListener("change", checkDirty);
    });

    // Update the big fuel-type badge in the header (PETROL / DIESEL / HYBRID / …).
    function refreshFuelBadge(fuel) {
      const badge = document.getElementById("fuel-badge");
      if (!badge) return;
      const meta = (typeof window.fuelTypeMeta === "function")
        ? window.fuelTypeMeta(fuel)
        : { label: String(fuel || "UNKNOWN").toUpperCase(), color: "#666", bg: "#ececec" };
      badge.textContent = meta.label;
      badge.style.color = meta.color;
      badge.style.backgroundColor = meta.bg;
      badge.style.borderColor = meta.color;
      badge.classList.add("visible");
    }
    // Live update of the badge as the user changes the select.
    document.getElementById("fuel_type").addEventListener("change", (e) => {
      refreshFuelBadge(e.target.value);
    });

    // Update the gearbox badge in the header (MANUAL / AUTO / SEMI-AUTO / …).
    // "unknown" hides the badge entirely — no point cluttering the header
    // with a "we don't know" chip. Muted grey palette so gearbox stays
    // secondary to the fuel chip.
    function refreshGearboxBadge(gb) {
      const badge = document.getElementById("gearbox-badge");
      if (!badge) return;
      const LABELS = {
        manual:           "MANUAL",
        automatic:        "AUTO",
        "semi-automatic": "SEMI-AUTO",
        cvt:              "CVT",
        "e-cvt":          "e-CVT",
      };
      const label = LABELS[String(gb || "").toLowerCase()];
      if (!label) {
        badge.textContent = "";
        badge.classList.remove("visible");
        return;
      }
      badge.textContent = label;
      badge.classList.add("visible");
    }
    document.getElementById("gearbox").addEventListener("change", (e) => {
      refreshGearboxBadge(e.target.value);
    });

    // --- Delete car is blocked while the car still has jobs ---
    function updateDeleteState(jobCount) {
      const btn = document.getElementById("delete-car");
      if (jobCount > 0) {
        btn.classList.add("btn-disabled");
        btn.title = "Delete all jobs for this car first — then you can delete the car.";
        btn.dataset.blocked = "1";
      } else {
        btn.classList.remove("btn-disabled");
        btn.removeAttribute("title");
        btn.dataset.blocked = "";
      }
    }

    async function loadCar() {
      try {
        const res = await fetch(`/api/cars/${encodeURIComponent(plate)}`);
        if (!res.ok) {
          if (res.status === 404) { carStatus.textContent = "Car not found."; return; }
          throw new Error(await res.text());
        }
        const data = await res.json();
        carData = data;
        document.getElementById("reg_no").value = toStr(data.reg_no) || plate;
        document.getElementById("make").value = toStr(data.make);
        // Model: prefer the user-saved value; only fall back to the MPMoil
        // variant name if nothing has been typed on the record yet. This
        // keeps hand edits from being overwritten by the MPMoil auto-guess.
        document.getElementById("model").value =
          toStr(data.model) || toStr(data.mpmoil_variant && data.mpmoil_variant.name);
        document.getElementById("customer_name").value = toStr(data.customer_name);
        document.getElementById("customer_phone").value = toStr(data.customer_phone);
        document.getElementById("notes").value = toStr(data.notes);
        document.getElementById("vin").value = toStr(data.vin);
        document.getElementById("pin").value = toStr(data.pin) || toStr(data.pin_code);
        document.getElementById("years").value = toStr(data.years) || toStr(data.mpmoil_years) || yearsFromVariant(data.mpmoil_variant);
        // Pre-fill Engine + oil overrides from saved values. loadVariantOilDetails
        // below only writes to the Engine field when it's empty, so a hand-typed
        // value survives an MPMoil round-trip.
        document.getElementById("engine").value = toStr(data.engine);
        document.getElementById("oil_capacity").value =
          data.oil_capacity != null && data.oil_capacity !== "" ? String(data.oil_capacity) : "";
        document.getElementById("oil_viscosity").value = toStr(data.oil_viscosity);
        // Fuel type select + big header badge. Legacy "hybrid" is mapped to
        // "petrol-electric" so the select shows the correct option even if
        // the backend migration hasn't touched this file yet.
        let fuelVal = toStr(data.fuel_type) || "unknown";
        if (fuelVal === "hybrid") fuelVal = "petrol-electric";
        document.getElementById("fuel_type").value = fuelVal;
        refreshFuelBadge(fuelVal);
        // Gearbox comes either from the MPMoil-oil-archive extraction
        // (backfilled by the migration script) or from a manual pick on
        // this form. "unknown" is the sentinel for "we don't know yet".
        const gearboxVal = toStr(data.gearbox) || "unknown";
        document.getElementById("gearbox").value = gearboxVal;
        refreshGearboxBadge(gearboxVal);
        snapshotBaseline();
        loadVariantOilDetails();
        refreshPhoto(toStr(data.photo), data.photo_updated_ms);
      } catch (e) {
        carStatus.textContent = "Error: " + e.message;
        carStatus.className = "status err";
      }
    }

    function refreshPhoto(photo, updatedMs) {
      const img = document.getElementById("car-photo");
      const none = document.getElementById("no-photo");
      if (photo) {
        const v = updatedMs || Date.now();
        img.onerror = () => {
          img.style.display = "none";
          none.textContent = "Photo could not be loaded — click to upload.";
          none.style.display = "";
        };
        img.onload = () => { none.textContent = "No photo yet — click to upload."; };
        img.src = `/api/cars/${encodeURIComponent(plate)}/photo?v=${v}`;
        img.style.display = "block";
        none.style.display = "none";
      } else {
        img.removeAttribute("src");
        img.style.display = "none";
        none.style.display = "";
      }
    }

    async function loadJobs() {
      const list = document.getElementById("jobs-list");
      const cnt = document.getElementById("jobs-count");
      list.innerHTML = "";
      try {
        const res = await fetch(`/api/cars/${encodeURIComponent(plate)}/jobs`);
        const data = await res.json();
        const items = data.items || [];
        cnt.textContent = `(${items.length})`;
        updateDeleteState(items.length);
        if (!items.length) {
          list.innerHTML = `<div class="muted">No jobs yet.</div>`;
          return;
        }
        // Same status → glyph mapping the global jobs list uses. Work
        // done is now the single terminal state (double green ✓✓);
        // legacy "closed" / "finished" rows fall through to the same
        // icon so historical entries render identically.
        const statusBadge = (s) => {
          switch (String(s || "").toLowerCase()) {
            case "work_done":
            case "closed":
            case "finished": return `<span class="st st-wd"  title="Work done">✓</span>`;
            case "paused":   return `<span class="st st-pau" title="Paused">⏸</span>`;
            case "open":     return `<span class="st st-op"  title="Open">●</span>`;
            default:         return "";
          }
        };
        // Extract the sequential job number from the filename
        // ({plate}_{N}.json → N). Falls back to "?" for any historical
        // record whose name doesn't match — shouldn't happen after the
        // unified rename, but keeps the row rendering safe.
        const jobNo = (name) => {
          const m = String(name || "").match(/_(\d+)\.json$/i);
          return m ? m[1] : "?";
        };
        // Newest job on top (highest #N). The unified filename convention
        // guarantees #N is chronological: _1 was the first Work-done, _N
        // the latest. Anything unparseable ("?") sinks to the bottom.
        const jobNoInt = (name) => {
          const m = String(name || "").match(/_(\d+)\.json$/i);
          return m ? Number(m[1]) : -1;
        };
        items.sort((a, b) => jobNoInt(b.name) - jobNoInt(a.name));

        items.forEach(j => {
          const div = document.createElement("div");
          div.className = "item";
          const date = j.date_in || new Date(j.saved_ms).toLocaleString();
          const timeRange = (j.time_in || j.time_out)
            ? ` &middot; ${j.time_in || "?"}–${j.time_out || "?"}` : "";
          // Delete moved into the job editor itself — a bottom-of-page button
          // there, so it's harder to hit by accident from the jobs list.
          // Badges (status + jobno) sit OUTSIDE .name so they're real
          // sibling flex-items — that makes both the date link and the
          // work-summary line up neatly to the right of them, instead of
          // the description wrapping under them.
          // Km at time of servicing — parsed from the raw string
          // ("85339", "85339.2") and rounded down to whole km. Empty
          // when the mechanic didn't record it, in which case the cell
          // is omitted entirely so it doesn't leave a blank slot.
          const kmRaw = String(j.kilometrage || "").trim();
          const kmNum = kmRaw ? Math.trunc(Number(kmRaw.replace(",", "."))) : NaN;
          const odoHtml = Number.isFinite(kmNum) && kmNum > 0
            ? `<span class="odo">${kmNum}<span class="odo-unit">km</span></span>`
            : "";
          div.innerHTML = `
            ${statusBadge(j.status)}
            <span class="jobno">${jobNo(j.name)}</span>
            ${odoHtml}
            <div class="name">
              <a href="/job.html?plate=${encodeURIComponent(plate)}&file=${encodeURIComponent(j.name)}">
                ${date}${timeRange}
              </a>
              ${j.work_summary ? `<div class="muted" style="white-space:normal;">${j.work_summary}</div>` : ""}
            </div>
          `;
          list.appendChild(div);
        });
      } catch (e) {
        list.innerHTML = `<div class="status err">Error: ${e.message}</div>`;
      }
    }

    async function loadOils() {
      const list = document.getElementById("oil-list");
      const cnt = document.getElementById("oil-count");
      list.innerHTML = "";
      try {
        const res = await fetch(`/api/cars/${encodeURIComponent(plate)}/oil`);
        const data = await res.json();
        const items = data.items || [];
        cnt.textContent = `(${items.length})`;
        if (!items.length) {
          list.innerHTML = `<div class="muted">No oil record.</div>`;
          return;
        }
        items.forEach(o => {
          const div = document.createElement("div");
          div.className = "item oil-item";
          div.innerHTML = `
            <div class="head">
              <div class="name"><a href="#" data-name="${o.name}">${o.title || o.name}</a></div>
            </div>
            <div class="body"><pre></pre></div>
          `;
          div.querySelector("a").addEventListener("click", async (ev) => {
            ev.preventDefault();
            if (div.classList.contains("open")) { div.classList.remove("open"); return; }
            try {
              const r = await fetch(`/api/cars/${encodeURIComponent(plate)}/oil/${encodeURIComponent(o.name)}`);
              const j = await r.json();
              div.querySelector("pre").textContent = JSON.stringify(j, null, 2);
              div.classList.add("open");
            } catch (_) {}
          });
          list.appendChild(div);
        });
      } catch (e) {
        list.innerHTML = `<div class="status err">Error: ${e.message}</div>`;
      }
    }

    document.getElementById("save-car").addEventListener("click", async () => {
      const saveBtn = document.getElementById("save-car");
      carStatus.textContent = "";
      carStatus.className = "status";
      // Merge edits into the loaded car so mpmoil/photo/variant fields are preserved.
      // Number fields (oil_capacity) are parsed to Number so the backend
      // stores 3.8 not "3.8"; empty string → null so blank means "no override".
      const capRaw = document.getElementById("oil_capacity").value.trim();
      const capNum = capRaw === "" ? null : Number(capRaw.replace(",", "."));
      const body = Object.assign({}, carData, {
        plate,
        customer_name: document.getElementById("customer_name").value.trim(),
        customer_phone: document.getElementById("customer_phone").value.trim(),
        notes: document.getElementById("notes").value,
        vin: document.getElementById("vin").value.trim(),
        pin: document.getElementById("pin").value.trim(),
        fuel_type: document.getElementById("fuel_type").value,
        gearbox: document.getElementById("gearbox").value,
        make: document.getElementById("make").value.trim(),
        model: document.getElementById("model").value.trim(),
        years: document.getElementById("years").value.trim(),
        engine: document.getElementById("engine").value.trim(),
        oil_capacity: Number.isFinite(capNum) ? capNum : null,
        oil_viscosity: document.getElementById("oil_viscosity").value.trim(),
      });
      showOverlay("Saving…");
      try {
        const res = await fetch(`/api/cars/${encodeURIComponent(plate)}`, {
          method: "PUT",
          headers: {"content-type": "application/json"},
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error(await res.text());
        // Success signal is intentional: the Save button disappears
        // (snapshotBaseline sees the form is no longer dirty). No
        // separate "Saved." status text — the vanishing button carries
        // the same message with less visual noise. Errors use the
        // shared button-flash instead so all pages read the same way.
        snapshotBaseline();
      } catch (_) {
        flashSaveStatus(saveBtn, "err");
      } finally {
        hideOverlay();
      }
    });

    document.getElementById("delete-car").addEventListener("click", async (ev) => {
      if (ev.currentTarget.dataset.blocked === "1") {
        carStatus.textContent = "Delete all jobs for this car first, then you can delete the car.";
        carStatus.className = "status err";
        return;
      }
      if (!confirm("Delete car AND all its jobs/oil archive? This cannot be undone.")) return;
      showOverlay("Deleting…");
      try {
        await fetch(`/api/cars/${encodeURIComponent(plate)}`, { method: "DELETE" });
      } finally {
        hideOverlay();
      }
      window.location.href = "/cars.html";
    });

    document.getElementById("new-job").addEventListener("click", () => {
      // Forward the odometer capture (from /cars.html) into the fresh
      // job so its mileage field pre-fills. Only ONE of km/mi is ever
      // present per the cars.html one-unit rule; we blindly forward
      // whatever came in.
      const incoming = new URLSearchParams(window.location.search);
      const odoParts = [];
      if (incoming.get("km")) odoParts.push("km=" + encodeURIComponent(incoming.get("km")));
      if (incoming.get("mi")) odoParts.push("mi=" + encodeURIComponent(incoming.get("mi")));
      const tail = odoParts.length ? "&" + odoParts.join("&") : "";
      window.location.href = `/job.html?plate=${encodeURIComponent(plate)}${tail}`;
    });

    // Photo upload / delete handlers
    const photoStatus = document.getElementById("photo-status");
    const photoInput = document.getElementById("photo-input");
    // Clicking the "No photo yet" placeholder opens the file picker.
    document.getElementById("no-photo").addEventListener("click", () => {
      photoInput.click();
    });
    photoInput.addEventListener("change", async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      if (!file.type.startsWith("image/")) {
        photoStatus.textContent = "Please choose an image file.";
        photoStatus.className = "status err";
        photoInput.value = "";
        return;
      }
      const reader = new FileReader();
      reader.onload = async () => {
        showOverlay("Uploading photo…");
        try {
          const res = await fetch(`/api/cars/${encodeURIComponent(plate)}/photo`, {
            method: "POST",
            headers: {"content-type": "application/json"},
            body: JSON.stringify({
              filename: file.name,
              data_base64: reader.result,
            }),
          });
          if (!res.ok) throw new Error(await errFromRes(res));
          const j = await res.json();
          carData.photo = j.filename;
          carData.photo_updated_ms = j.photo_updated_ms;
          refreshPhoto(j.filename, j.photo_updated_ms);
          // If changed from the full-screen view, update that image too.
          if (lightbox.classList.contains("open")) {
            lightboxImg.src = document.getElementById("car-photo").src;
          }
          photoStatus.textContent = "Photo saved.";
          photoStatus.className = "status ok";
          setTimeout(() => { photoStatus.textContent = ""; }, 1500);
        } catch (err) {
          photoStatus.textContent = "Error: " + err.message;
          photoStatus.className = "status err";
        } finally {
          hideOverlay();
          photoInput.value = "";
        }
      };
      reader.onerror = () => {
        photoStatus.textContent = "Could not read file.";
        photoStatus.className = "status err";
      };
      reader.readAsDataURL(file);
    });

    // Lightbox: click photo to enlarge, click backdrop / × / Esc to close
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    document.getElementById("car-photo").addEventListener("click", () => {
      const src = document.getElementById("car-photo").src;
      if (!src) return;
      lightboxImg.src = src;
      lightbox.classList.add("open");
    });
    function closeLightbox() {
      lightbox.classList.remove("open");
      lightboxImg.removeAttribute("src");
    }
    document.getElementById("lb-change").addEventListener("click", () => photoInput.click());
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox || e.target.id === "lightbox-img") closeLightbox();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && lightbox.classList.contains("open")) closeLightbox();
    });

    document.getElementById("lb-delete").addEventListener("click", async () => {
      if (!confirm("Delete this photo?")) return;
      showOverlay("Deleting…");
      try {
        const res = await fetch(`/api/cars/${encodeURIComponent(plate)}/photo`, { method: "DELETE" });
        if (!res.ok) throw new Error(await errFromRes(res));
        delete carData.photo;
        delete carData.photo_updated_ms;
        refreshPhoto(null);
        closeLightbox();
        photoStatus.textContent = "Photo deleted.";
        photoStatus.className = "status ok";
        setTimeout(() => { photoStatus.textContent = ""; }, 1500);
      } catch (err) {
        photoStatus.textContent = "Error: " + err.message;
        photoStatus.className = "status err";
      } finally {
        hideOverlay();
      }
    });

    loadCar();
    loadJobs();
    loadOils();
  </script>
</body>

</html>
